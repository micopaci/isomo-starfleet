<!doctype html>
<html lang="en">
<head>

  <style>
/* Starfleet — operator dashboard stylesheet
   Theme: warm off-white (light) / deep ink (dark), terracotta accent.
   Type: Newsreader (serif titles) + Inter (UI) + IBM Plex Mono (numbers).
*/
:root {
  --bg:       #f6f3ec;
  --bg-2:     #efeadd;
  --surface:  #ffffff;
  --surface-2:#f9f6ef;
  --ink:      #141414;
  --ink-2:    #3a3a3a;
  --ink-3:    #6b6b6b;
  --muted:    #8a867b;
  --rule:     #d9d4c5;
  --rule-2:   #e6e1d3;

  --accent:         #c8553d;
  --accent-ink:     #8c3422;
  --accent-soft:    #f4d9cf;

  --ok:      #3e7d4a;
  --ok-soft: #d9e8d8;
  --warn:    #b7791f;
  --warn-soft:#f2e3c4;
  --bad:     #b13c3c;
  --bad-soft:#f2d6d3;
  --mute:    #9e9a8b;
  --mute-soft:#e7e3d6;

  --radius: 0px;
  --row-pad: 14px 16px;
  --panel-pad: 20px;
  --shadow-sm: 0 1px 0 var(--rule-2);

  --font-ui:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-serif: 'Newsreader', 'Iowan Old Style', 'Palatino', Georgia, serif;
  --font-mono:  'IBM Plex Mono', ui-monospace, Menlo, monospace;
}

[data-theme="dark"] {
  --bg:       #0b1220;
  --bg-2:     #0e1727;
  --surface:  #111c2e;
  --surface-2:#142339;
  --ink:      #f2ede0;
  --ink-2:    #c9c3b4;
  --ink-3:    #97917f;
  --muted:    #7a7665;
  --rule:     #1e2d46;
  --rule-2:   #18253a;

  --accent:      #e8856f;
  --accent-ink:  #f7b9a8;
  --accent-soft: #3b2019;

  --ok:      #7ab389;
  --ok-soft: #1d3626;
  --warn:    #e6b86b;
  --warn-soft:#3a2c13;
  --bad:     #e28482;
  --bad-soft:#3a1b1b;
  --mute:    #87826f;
  --mute-soft:#1a2335;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: var(--font-ui);
  color: var(--ink);
  background: var(--bg);
  font-size: 13.5px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.mono { font-family: var(--font-mono); font-feature-settings: 'tnum' 1; font-size: .92em; letter-spacing: 0; }
.muted { color: var(--muted); }
.eyebrow {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

/* ——— Shell ——— */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
}
.app.is-tight { grid-template-columns: 64px 1fr; }
.app.is-tight .side__label { display: none; }
.app.is-tight .side__head__name { display: none; }

.side {
  border-right: 1px solid var(--rule);
  background: var(--bg);
  padding: 22px 14px;
  position: sticky; top: 0;
  height: 100vh;
  display: flex; flex-direction: column;
  gap: 24px;
}
.side__head {
  display: flex; align-items: center; gap: 10px;
  padding: 0 6px 14px;
  border-bottom: 1px solid var(--rule);
}
.side__logo {
  width: 28px; height: 28px;
  background: var(--ink);
  color: var(--bg);
  display: grid; place-items: center;
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 16px;
  letter-spacing: -0.02em;
}
.side__head__name {
  font-family: var(--font-serif);
  font-size: 17px;
  letter-spacing: -0.01em;
}
.side__head__name small { display: block; font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 1px; }

.side__section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--muted);
  padding: 0 10px;
  margin-bottom: 6px;
}
.nav { display: flex; flex-direction: column; gap: 1px; }
.nav__item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  color: var(--ink-2);
  background: transparent;
  border: 0;
  text-align: left;
  width: 100%;
  cursor: pointer;
  font-size: 13.5px;
  font-family: inherit;
  position: relative;
}
.nav__item:hover { background: var(--bg-2); color: var(--ink); }
.nav__item.is-active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: inset 2px 0 0 var(--accent);
}
.nav__item .nav__count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
.nav__item.is-active .nav__count { color: var(--accent); }

.side__foot { margin-top: auto; display: flex; flex-direction: column; gap: 12px; }
.side__pulse {
  border: 1px solid var(--rule);
  padding: 12px;
  background: var(--surface-2);
}
.side__pulse__label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
.side__pulse__value { font-family: var(--font-serif); font-size: 22px; letter-spacing: -.02em; margin-top: 4px; }
.side__pulse__sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ——— Topbar ——— */
.top {
  position: sticky; top: 0; z-index: 5;
  display: flex; align-items: center; gap: 14px;
  padding: 12px 28px;
  border-bottom: 1px solid var(--rule);
  background: color-mix(in oklch, var(--bg) 88%, transparent);
  backdrop-filter: blur(8px);
}
.top__crumbs { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); }
.top__crumbs strong { color: var(--ink); font-weight: 500; }
.top__spacer { flex: 1; }
.top__pulse { display: flex; gap: 18px; align-items: center; }
.top__pulse__item { display: flex; align-items: baseline; gap: 6px; }
.top__pulse__item .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
.top__pulse__item .val { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink); }

.top__campus {
  font-family: var(--font-ui);
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--rule);
  padding: 6px 10px;
  font-size: 12.5px;
  outline: none;
}

.icon-btn {
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--ink-2);
  width: 30px; height: 30px;
  display: grid; place-items: center;
  cursor: pointer;
}
.icon-btn:hover { color: var(--ink); background: var(--bg-2); }

/* ——— Main ——— */
.main { min-width: 0; display: flex; flex-direction: column; overflow-x: hidden; }
.view { padding: 28px 28px 64px; width: 100%; box-sizing: border-box; display: flex; flex-direction: column; gap: 22px; }

.view__header { display: flex; align-items: flex-end; gap: 20px; justify-content: space-between; border-bottom: 1px solid var(--rule); padding-bottom: 20px; }
.view__title { font-family: var(--font-serif); font-weight: 500; font-size: 34px; letter-spacing: -0.02em; margin: 4px 0 6px; line-height: 1.1; }
.view__lede { color: var(--ink-3); max-width: 56ch; margin: 0; }
.view__actions { display: flex; gap: 8px; align-items: center; }

/* ——— Buttons ——— */
.btn {
  font-family: var(--font-ui);
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--rule);
  padding: 7px 12px;
  font-size: 12.5px;
  cursor: pointer;
  transition: background .12s ease, border-color .12s ease, color .12s ease;
}
.btn:hover { background: var(--bg-2); border-color: var(--ink-3); }
.btn--primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.btn--primary:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn--sm { padding: 4px 9px; font-size: 11.5px; }

.link {
  background: none; border: 0; padding: 0;
  color: var(--ink-2); font-family: inherit; font-size: 12.5px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
}
.link:hover { color: var(--accent); }

/* ——— Cards / stats ——— */
.cards { display: grid; gap: 1px; background: var(--rule); border: 1px solid var(--rule); }
.cards--4 { grid-template-columns: repeat(4, 1fr); }
.cards--2 { grid-template-columns: repeat(2, 1fr); }
.stat { padding: 18px 20px; background: var(--surface); display: flex; flex-direction: column; gap: 6px; min-height: 104px; }
.stat__label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
.stat__value { font-family: var(--font-serif); font-size: 28px; letter-spacing: -.02em; color: var(--ink); }
.stat__value--ok   { color: var(--ok); }
.stat__value--warn { color: var(--warn); }
.stat__value--bad  { color: var(--bad); }
.stat__sub { font-size: 12px; color: var(--muted); }
.stat__trend { margin-top: auto; color: var(--ink-3); }

/* ——— Panels ——— */
.panel { background: var(--surface); border: 1px solid var(--rule); }
.panel--flush { padding: 0; }
.panel--pad { padding: var(--panel-pad); }
.panel__header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--rule-2);
}
.panel__header--sub { padding-top: 18px; }
.panel__title { font-family: var(--font-serif); font-size: 18px; font-weight: 500; margin: 0; letter-spacing: -0.01em; }
.panel__subtitle { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin: 0; }

/* ——— Tables ——— */
.tbl-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th {
  text-align: left;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 16px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--rule);
  font-weight: 500;
}
.tbl td { padding: var(--row-pad); border-bottom: 1px solid var(--rule-2); vertical-align: middle; }
.tbl tbody tr:last-child td { border-bottom: 0; }
.tbl .num { text-align: right; }
.tbl th.num { text-align: right; }
.tbl__row--click { cursor: pointer; }
.tbl__row--click:hover { background: var(--bg-2); }
.tbl__chev { color: var(--muted); width: 24px; text-align: right; }
.tbl__row--click:hover .tbl__chev { color: var(--accent); }
.cell-primary { font-weight: 500; color: var(--ink); }
.cell-mono { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }

.tbl--data td { padding: 12px 16px; }
.tbl-footer { padding: 12px 20px; font-size: 12px; border-top: 1px solid var(--rule-2); }

/* ——— Status chips ——— */
.dot { display: inline-block; border-radius: 50%; }
.dot--ok   { background: var(--ok);   box-shadow: 0 0 0 2px color-mix(in oklch, var(--ok) 20%, transparent); }
.dot--warn { background: var(--warn); box-shadow: 0 0 0 2px color-mix(in oklch, var(--warn) 20%, transparent); }
.dot--bad  { background: var(--bad);  box-shadow: 0 0 0 2px color-mix(in oklch, var(--bad) 20%, transparent); animation: pulse 2s ease-in-out infinite; }
.dot--mute { background: var(--mute); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 2px color-mix(in oklch,var(--bad) 20%,transparent);} 50%{box-shadow:0 0 0 5px color-mix(in oklch,var(--bad) 10%,transparent);} }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11.5px;
  padding: 3px 8px;
  border: 1px solid transparent;
  font-family: var(--font-ui);
  margin-right: 4px;
}
.chip--ok   { background: var(--ok-soft);   color: var(--ok);   border-color: color-mix(in oklch, var(--ok) 30%, transparent); }
.chip--warn { background: var(--warn-soft); color: var(--warn); border-color: color-mix(in oklch, var(--warn) 30%, transparent); }
.chip--bad  { background: var(--bad-soft);  color: var(--bad);  border-color: color-mix(in oklch, var(--bad) 30%, transparent); }
.chip--mute { background: var(--mute-soft); color: var(--mute); border-color: color-mix(in oklch, var(--mute) 30%, transparent); }

/* Monochrome status mode */
.mono-status .chip { background: transparent; border-color: var(--rule); color: var(--ink-2); }
.mono-status .dot--ok, .mono-status .dot--warn, .mono-status .dot--bad, .mono-status .dot--mute {
  background: currentColor;
  box-shadow: none;
}
.mono-status .dot--bad { animation: none; }

/* ——— Search ——— */
.search {
  display: flex; align-items: center; gap: 8px;
  border: 1px solid var(--rule);
  padding: 6px 10px;
  background: var(--surface);
  min-width: 220px;
  color: var(--muted);
}
.search input {
  border: 0; outline: 0; background: transparent;
  font-family: inherit; font-size: 12.5px;
  color: var(--ink);
  flex: 1;
}
.search__clear {
  background: none; border: 0; cursor: pointer; color: var(--muted); font-size: 16px; line-height: 1;
}

/* ——— Segmented ——— */
.seg {
  display: inline-flex;
  border: 1px solid var(--rule);
  background: var(--surface);
}
.seg__btn {
  background: transparent;
  border: 0;
  border-right: 1px solid var(--rule-2);
  padding: 6px 12px;
  font-family: inherit;
  font-size: 12.5px;
  color: var(--ink-2);
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
}
.seg__btn:last-child { border-right: 0; }
.seg__btn:hover { background: var(--bg-2); color: var(--ink); }
.seg__btn.is-active { background: var(--ink); color: var(--bg); }
.seg__count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: inherit;
  opacity: .65;
}

/* ——— Split layouts ——— */
.split { display: grid; grid-template-columns: 1.35fr 1fr; gap: 20px; }
@media (max-width: 1100px) { .split { grid-template-columns: 1fr; } }

/* ——— Mix bar ——— */
.mix { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.mix__bar { display: flex; height: 10px; overflow: hidden; border: 1px solid var(--rule-2); }
.mix__seg { display: block; }
.mix__seg--ok   { background: var(--ok); }
.mix__seg--warn { background: var(--warn); }
.mix__seg--bad  { background: var(--bad); }
.mix__seg--mute { background: var(--mute); }
.mix__legend { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; }
.mix__legend li { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
.mix__legend li span:last-child { margin-left: auto; color: var(--ink); }

.minibars { padding: 12px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
.minibar__row { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 4px; }
.minibar__track { height: 4px; background: var(--rule-2); position: relative; }
.minibar__fill { position: absolute; top: 0; left: 0; height: 100%; }
.minibar__fill--ok   { background: var(--ok); }
.minibar__fill--warn { background: var(--warn); }
.minibar__fill--bad  { background: var(--bad); }

/* ——— Campus grid ——— */
.campus-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1px; background: var(--rule); border-top: 1px solid var(--rule); }
.campus-card { padding: 18px 20px; background: var(--surface); display: flex; flex-direction: column; gap: 14px; }
.campus-card__head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
.campus-card__name { font-family: var(--font-serif); font-size: 17px; letter-spacing: -0.01em; }
.campus-card__count { font-family: var(--font-serif); font-size: 28px; letter-spacing: -0.02em; line-height: 1; color: var(--ink); text-align: right; }
.campus-card__count span { display: block; font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-top: 4px; }
.campus-card__stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 0; padding: 0; }
.campus-card__stats > div { display: flex; flex-direction: column; gap: 2px; }
.campus-card__stats dt { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }
.campus-card__stats dd { margin: 0; font-family: var(--font-serif); font-size: 18px; letter-spacing: -.02em; }
.campus-card__stats dd.warn { color: var(--warn); }

.campus-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 14px 0; }
.dish-mini { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px 16px; padding-top: 14px; border-top: 1px solid var(--rule-2); }
.dish-mini__item { display: flex; align-items: center; gap: 8px; font-size: 12px; }

/* ——— Storage/battery bars ——— */
.sbar { display: inline-flex; align-items: center; gap: 10px; justify-content: flex-end; min-width: 100px; }
.sbar__track { width: 56px; height: 4px; background: var(--rule-2); position: relative; }
.sbar__fill { position: absolute; inset: 0; }
.sbar__fill--ok   { background: var(--ok); }
.sbar__fill--warn { background: var(--warn); }
.sbar__fill--bad  { background: var(--bad); }

/* ——— Alerts ——— */
.alerts { list-style: none; margin: 0; padding: 0; }
.alert {
  display: grid;
  grid-template-columns: 140px 1fr auto;
  gap: 18px;
  align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid var(--rule-2);
}
.alert:last-child { border-bottom: 0; }
.alert.is-ack { opacity: .55; }
.alert__sev { display: flex; flex-direction: column; gap: 4px; }
.sev {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  padding: 2px 7px;
  width: fit-content;
}
.sev--critical { background: var(--bad);  color: #fff; }
.sev--warning  { background: var(--warn); color: #1a1a1a; }
.sev--info     { background: var(--mute-soft); color: var(--ink-2); border: 1px solid var(--rule); }
.alert__msg { font-size: 13.5px; }
.alert__meta { font-size: 11.5px; margin-top: 3px; }
.alert__actions { display: flex; gap: 6px; }
.empty { padding: 30px; text-align: center; color: var(--muted); }

/* ——— Drawer ——— */
.scrim { position: fixed; inset: 0; background: rgba(12,10,8,.35); z-index: 40; animation: fade .18s ease; }
[data-theme="dark"] .scrim { background: rgba(0,0,0,.55); }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: 540px; max-width: 92vw;
  background: var(--bg); border-left: 1px solid var(--rule);
  padding: 24px;
  z-index: 50;
  overflow: auto;
  display: flex; flex-direction: column; gap: 18px;
  animation: slide .22s ease;
}
@keyframes slide { from { transform: translateX(12px); opacity: 0;} to { transform: none; opacity: 1;} }
@keyframes fade { from { opacity: 0;} to { opacity: 1; }}
.drawer__head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
.drawer__title { font-family: var(--font-serif); font-size: 26px; letter-spacing: -0.02em; margin: 2px 0 4px; font-weight: 500; }
.drawer__row { display: flex; gap: 10px; align-items: center; }
.drawer__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--rule); border: 1px solid var(--rule); }
.drawer__grid .stat { padding: 14px; min-height: 0; background: var(--surface); }
.drawer__grid .stat__value { font-size: 22px; }
.drawer__section { display: flex; flex-direction: column; gap: 8px; }
.drawer-list { list-style: none; margin: 0; padding: 0; border: 1px solid var(--rule); }
.drawer-list li { display: grid; grid-template-columns: 1.5fr 1fr auto; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--rule-2); align-items: center; background: var(--surface); }
.drawer-list li:last-child { border-bottom: 0; }
.chart { background: var(--surface); border: 1px solid var(--rule); padding: 12px 14px; }
.chart svg { width: 100%; height: 64px; color: var(--accent); }
.chart__axis { display: flex; justify-content: space-between; font-size: 10px; margin-top: 6px; }
.drawer__foot { display: flex; gap: 8px; margin-top: auto; padding-top: 14px; border-top: 1px solid var(--rule); }

/* ——— Map ——— */
.map-wrap {
  display: grid;
  grid-template-columns: 1fr 280px;
  align-items: stretch;
}
.map-stage {
  position: relative;
  padding: 0;
  border-right: 1px solid var(--rule);
  background: var(--surface-2);

  <!-- ── Data ── -->
  <script type="text/babel">
// ── Real API layer ─────────────────────────────────────────────────────────────
// Auto-detect backend: production vs local dev.
// hostname === '' means the file was opened directly (file://) — treat as local.
const _h = window.location.hostname;
const _isLocal = _h === '' || _h === 'localhost' || _h === '127.0.0.1';
const PROD_API  = 'https://api.starfleet.icircles.rw';
const LOCAL_API = 'http://localhost:3000';
const DEFAULT_API = _isLocal ? LOCAL_API : PROD_API;

// If a stored base was for localhost but we're on a non-local domain, reset it.
let _storedBase = localStorage.getItem('sf_base') || DEFAULT_API;
if (!_isLocal && (_storedBase.includes('localhost') || _storedBase.includes('127.0.0.1'))) {
  _storedBase = PROD_API;
  localStorage.setItem('sf_base', PROD_API);
}
let _apiBase = _storedBase;
let _token   = localStorage.getItem('sf_tok')  || '';
let _ws      = null;

function isAuthed() { return !!_token; }

async function apiFetch(path) {
  let r;
  try {
    r = await fetch(_apiBase + path, {
      headers: { Authorization: `Bearer ${_token}` },
    });
  } catch (netErr) {
    // Network failure (server down, CORS preflight blocked, etc.)
    throw new Error(`Network error — cannot reach ${_apiBase}. Is the server running?`);
  }
  if (r.status === 401) {
    localStorage.removeItem('sf_tok');
    _token = '';
    // Trigger logout — use window._SF_LOGOUT if set, else force reload
    if (window._SF_LOGOUT) {
      window._SF_LOGOUT();
    } else {
      window.location.reload();
    }
    throw new Error('Session expired — please sign in again');
  }
  if (!r.ok) throw new Error(`Server error: HTTP ${r.status}`);
  return r.json();
}

async function doLogin(email, pass, base) {
  _apiBase = (base || _apiBase).replace(/\/$/, '');
  const r = await fetch(`${_apiBase}/auth/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password: pass }),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error || 'Login failed');
  }
  const d = await r.json();
  _token = d.token;
  localStorage.setItem('sf_tok', _token);
  localStorage.setItem('sf_base', _apiBase);
  return _token;
}

function doLogout() {
  localStorage.removeItem('sf_tok');
  _token = '';
  if (_ws) { _ws.close(); _ws = null; }
}

// ── Signal helpers ────────────────────────────────────────────────────────────
function computeScore(sig) {
  if (!sig) return null;
  const pd = sig.ping_drop_pct ?? 0, ob = sig.obstruction_pct ?? 0;
  const sn = sig.snr ?? 9.5,         la = sig.pop_latency_ms ?? 35;
  let s = 100;
  s -= Math.min(30, pd * 6);
  s -= Math.min(30, ob * 2);
  s -= Math.max(0, (9.5 - sn) * 8);
  s -= Math.max(0, (la - 35) * 0.3);
  return Math.max(0, Math.min(100, Math.round(s)));
}

function siteStatusStr(site) {
  if (site.online_laptops === 0) return 'dark';
  const sig = site.signal;
  if (!sig) return 'dark';
  if (sig.confidence === 'low') return 'degraded';
  if (computeScore(sig) < 60) return 'degraded';
  return 'online';
}

function timeAgoStr(iso) {
  if (!iso) return 'Never';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1)    return 'just now';
  if (m < 60)   return m + 'm ago';
  if (m < 1440) return Math.floor(m/60) + 'h ago';
  return Math.floor(m/1440) + 'd ago';
}

// ── Data mapping: real API → view-compatible shape ────────────────────────────
function mapSites(sites) {
  // Each Site IS a campus (one dish per campus)
  const CAMPUSES = sites.map(s => ({
    id:       s.id,
    name:     s.name,
    region:   s.location || 'Rwanda',
    students: 0,
    lat:      s.lat,
    lng:      s.lng,
  }));

  const DISHES = sites.map(s => {
    const sig = s.signal;
    const st  = siteStatusStr(s);
    return {
      _siteId:      s.id,
      id:           s.starlink_sn || `DISH-${s.id}`,
      name:         s.name,
      campus:       s.id,      // integer — matches CAMPUSES[].id
      sku:          'Starlink',
      installed:    null,
      status:       st === 'dark' ? 'offline' : st,
      latency:      sig?.pop_latency_ms ?? 0,
      snr:          sig?.snr          ?? 0,
      obstruction:  sig?.obstruction_pct ?? 0,
      down:         null,       // throughput not in API
      up:           null,
      uptime:       s.score     ?? 0,
      score:        s.score,
      score7d:      s.score_7day_avg,
      anomaly:      sig?.anomaly       ?? false,
      anomalyDelta: sig?.anomaly_delta ?? null,
      dataQuality:  sig?.data_quality  ?? null,
      confidence:   sig?.confidence    ?? 'low',
      onlineLaptops: s.online_laptops,
      totalLaptops:  s.total_laptops,
      throughputTrend: [],
      latencyTrend:    [],
    };
  });

  return { CAMPUSES, DISHES };
}

function mapDevices(devices) {
  return devices.map(d => ({
    id:         d.id,
    tag:        d.hostname || d.windows_sn || `DEV-${d.id}`,
    model:      d.manufacturer || 'Unknown',
    vendor:     d.manufacturer || '—',
    ram:        null,
    os:         'Windows 11',
    assignedTo: null,
    campus:     d.site_id,
    status:     d.status === 'online' ? 'healthy'
              : d.status === 'stale'  ? 'needs-update'
              : 'offline',
    storage:    null,       // not in API
    battery:    null,       // not in API
    lastSeen:   timeAgoStr(d.last_seen),
    staleMin:   d.stale_min ?? null,
    siteName:   d.site_name,
    windowsSn:  d.windows_sn,
    role:       d.role,
  }));
}

function buildAlerts(dishes) {
  const alerts = []; let n = 1000;
  dishes.forEach(d => {
    if (d.status === 'offline') {
      alerts.push({ id: `A-${n++}`, severity: 'critical', source: d.id, campus: d.campus,
        message: `${d.name} is offline — site unreachable`, ts: 'now', ack: false, assignee: null });
    } else if (d.status === 'degraded') {
      alerts.push({ id: `A-${n++}`, severity: 'warning', source: d.id, campus: d.campus,
        message: `${d.name} has degraded signal`, ts: 'now', ack: false, assignee: null });
    }
    if (d.anomaly) {
      const delta = d.anomalyDelta != null ? ` (−${Math.abs(d.anomalyDelta)}pt vs avg)` : '';
      alerts.push({ id: `A-${n++}`, severity: 'warning', source: d.id, campus: d.campus,
        message: `Signal anomaly at ${d.name}${delta}`, ts: 'now', ack: false, assignee: null });
    }
    if (d.dataQuality === 'low_data') {
      alerts.push({ id: `A-${n++}`, severity: 'info', source: d.id, campus: d.campus,
        message: `Low data quality at ${d.name}`, ts: 'now', ack: false, assignee: null });
    }
  });
  return alerts;
}

window._API = { apiFetch, doLogin, doLogout, isAuthed, DEFAULT_API, getBase: () => _apiBase };
window._MAPPERS = { mapSites, mapDevices, buildAlerts };

// Placeholder so later scripts don't crash during initial render
window.STARFLEET_DATA = { CAMPUSES: [], DISHES: [], COMPUTERS: [], STUDENTS: [], ALERTS: [] };

  </script>

  <script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

function Sparkline({ points, stroke = 'currentColor', fill = 'none', height = 24, width = 88, dim = false }) {
  if (!points || !points.length) return null;
  const min = Math.min(...points), max = Math.max(...points), span = max - min || 1;
  const step = width / (points.length - 1);
  const d = points.map((p,i) => {
    const x = i * step, y = height - ((p-min)/span) * (height-4) - 2;
    return `${i===0?'M':'L'}${x.toFixed(1)} ${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg width={width} height={height} style={{display:'block', opacity: dim ? 0.4 : 1}}>
      <path d={d} stroke={stroke} strokeWidth="1.25" fill={fill} />
    </svg>
  );
}

const STATUS_LABEL = {
  online:'Online', degraded:'Degraded', offline:'Offline',
  standby:'Standby', maintenance:'Maintenance',
  healthy:'Healthy', 'needs-update':'Update due', 'low-storage':'Low storage',
  critical:'Critical', 'in-repair':'In repair',
};
const STATUS_TONE = {
  online:'ok', healthy:'ok',
  degraded:'warn', 'needs-update':'warn', 'low-storage':'warn',
  offline:'bad', critical:'bad',
  standby:'mute', maintenance:'mute', 'in-repair':'mute',
};
function StatusDot({ status, size = 6 }) {
  const tone = STATUS_TONE[status] || 'mute';
  return <span className={`dot dot--${tone}`} style={{width:size,height:size}} aria-label={status} />;
}
function StatusChip({ status }) {
  const tone = STATUS_TONE[status] || 'mute';
  return <span className={`chip chip--${tone}`}><StatusDot status={status} />{STATUS_LABEL[status] || status}</span>;
}

function Stat({ label, value, sub, trend, tone }) {
  return (
    <div className="stat">
      <div className="stat__label">{label}</div>
      <div className={`stat__value ${tone ? 'stat__value--'+tone : ''}`}>{value}</div>
      {sub && <div className="stat__sub">{sub}</div>}
      {trend && <div className="stat__trend"><Sparkline points={trend} height={20} width={96} /></div>}
    </div>
  );
}

function Segmented({ options, value, onChange }) {
  return (
    <div className="seg" role="tablist">
      {options.map(opt => (
        <button key={opt.id} role="tab" aria-selected={value===opt.id}
          className={`seg__btn ${value===opt.id?'is-active':''}`} onClick={() => onChange(opt.id)}>
          {opt.label}
          {typeof opt.count === 'number' && <span className="seg__count">{opt.count}</span>}
        </button>
      ))}
    </div>
  );
}

function Search({ value, onChange, placeholder }) {
  return (
    <div className="search">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><circle cx="7" cy="7" r="5"/><path d="M14 14l-3-3"/></svg>
      <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||'Search'} />
      {value && <button className="search__clear" onClick={()=>onChange('')} aria-label="Clear">×</button>}
    </div>
  );
}

const Icon = {
  dish:     <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><path d="M2 11 Q8 3 14 11"/><path d="M8 11v2.5"/><path d="M5.5 13.5h5"/><circle cx="8" cy="7.5" r="1"/></svg>,
  laptop:   <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><rect x="2.5" y="3" width="11" height="7.5" rx="0.5"/><path d="M1 12h14"/></svg>,
  user:     <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><circle cx="8" cy="6" r="2.5"/><path d="M3 13c1-2.5 3-3.5 5-3.5s4 1 5 3.5"/></svg>,
  bell:     <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><path d="M4 11V7a4 4 0 1 1 8 0v4l1 1H3z"/><path d="M7 13.5a1 1 0 0 0 2 0"/></svg>,
  campus:   <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><path d="M2 13V7l6-3.5L14 7v6"/><path d="M2 13h12"/><rect x="6.5" y="9" width="3" height="4"/></svg>,
  overview: <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><rect x="2" y="2" width="5" height="5"/><rect x="9" y="2" width="5" height="5"/><rect x="2" y="9" width="5" height="5"/><rect x="9" y="9" width="5" height="5"/></svg>,
  sun:      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><circle cx="8" cy="8" r="3"/><path d="M8 1.5v1.5M8 13v1.5M1.5 8h1.5M13 8h1.5M3.2 3.2l1 1M11.8 11.8l1 1M3.2 12.8l1-1M11.8 4.2l1-1"/></svg>,
  moon:     <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M13 9.5A5.5 5.5 0 1 1 6.5 3a4.5 4.5 0 0 0 6.5 6.5z"/></svg>,
  close:    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M3 3l10 10M13 3 3 13"/></svg>,
  arrow:    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M2 5h6M5 2l3 3-3 3"/></svg>,
  map:      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><path d="M6 2 2 3.5v10.5L6 13l4 1.5L14 13V2.5L10 4 6 2.5z"/><path d="M6 2.5V13M10 4v10.5"/></svg>,
};

function campusName(data, id) {
  const c = data.CAMPUSES.find(x => x.id === id);
  return c ? c.name : id;
}

function usePersisted(key, initial) {
  const [v, setV] = useState(() => {
    try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : initial; } catch { return initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }, [key, v]);
  return [v, setV];
}

window._SF = { Sparkline, StatusDot, StatusChip, Stat, Segmented, Search, Icon, STATUS_LABEL, STATUS_TONE, campusName, usePersisted };
  </script>

  <script type="text/babel">
const { useState: uS, useMemo: uM } = React;
const { StatusDot, StatusChip, Stat, Segmented, Search, Icon, campusName, Sparkline } = window._SF;

function MiniBar({ label, n, total, tone }) {
  const pct = (n/total)*100;
  return (
    <div className="minibar">
      <div className="minibar__row"><span>{label}</span><span className="mono">{n}<span className="muted"> / {total}</span></span></div>
      <div className="minibar__track"><span className={`minibar__fill minibar__fill--${tone}`} style={{width:`${Math.max(2,pct)}%`}} /></div>
    </div>
  );
}

function StorageBar({ pct }) {
  if (pct == null) return <span className="muted">—</span>;
  const tone = pct > 90 ? 'bad' : pct > 75 ? 'warn' : 'ok';
  return <div className="sbar"><span className="mono">{pct}%</span><div className="sbar__track"><span className={`sbar__fill sbar__fill--${tone}`} style={{width:`${pct}%`}} /></div></div>;
}
function BatteryCell({ pct }) {
  if (pct == null) return <span className="muted">—</span>;
  const tone = pct < 20 ? 'bad' : pct < 40 ? 'warn' : 'ok';
  return <div className="sbar"><span className="mono">{pct}%</span><div className="sbar__track"><span className={`sbar__fill sbar__fill--${tone}`} style={{width:`${pct}%`}} /></div></div>;
}

function Overview({ data, ui, onOpenDish, onJump }) {
  const online = data.DISHES.filter(d=>d.status==='online').length;
  const degraded = data.DISHES.filter(d=>d.status==='degraded').length;
  const offline = data.DISHES.filter(d=>d.status==='offline').length;
  const maintenance = data.DISHES.filter(d=>d.status==='maintenance'||d.status==='standby').length;
  const healthyPCs = data.COMPUTERS.filter(c=>c.status==='healthy').length;
  const connIssue = data.STUDENTS.filter(s=>s.issues.includes('connectivity')).length;
  const laptopIssue = data.STUDENTS.filter(s=>s.issues.includes('laptop')).length;
  const openAlerts = data.ALERTS.filter(a=>!a.ack).length;
  const fleetUptime = (data.DISHES.reduce((s,d)=>s+d.uptime,0)/data.DISHES.length).toFixed(2);
  const avgLatency = Math.round(data.DISHES.filter(d=>d.latency>0).reduce((s,d)=>s+d.latency,0)/data.DISHES.filter(d=>d.latency>0).length);
  const topIssues = data.DISHES.filter(d=>d.status!=='online'&&d.status!=='standby').sort((a,b)=>a.status==='offline'?-1:b.status==='offline'?1:b.obstruction-a.obstruction).slice(0,4);
  return (
    <div className="view">
      <div className="view__header">
        <div>
          <div className="eyebrow">Today · Kigali CAT</div>
          <h1 className="view__title">Good morning. {openAlerts} thing{openAlerts!==1?'s':''} need a look.</h1>
          <p className="view__lede">One dish in Gashora is offline. Two students on degraded links. Everything else is humming.</p>
        </div>
        <div className="view__actions">
          <button className="btn">Run diagnostics</button>
          <button className="btn btn--primary">Open runbook</button>
        </div>
      </div>
      <div className="cards cards--4">
        <Stat label="Fleet uptime · 30d" value={fleetUptime+'%'} sub={`${online}/${data.DISHES.length} online now`} trend={[98.8,99.1,99.0,99.3,99.2,99.4,99.5,99.6,99.7,99.8,99.7,99.8]} />
        <Stat label="Avg latency" value={avgLatency+'ms'} sub="p95 across online dishes" trend={[42,38,44,41,39,37,36,38,35,34,36,35]} />
        <Stat label="Open alerts" value={openAlerts} sub={openAlerts?'requires triage':'all clear'} tone={openAlerts?'warn':'ok'} />
        <Stat label="Students impacted" value={connIssue+laptopIssue} sub={`${connIssue} conn · ${laptopIssue} laptop`} />
      </div>
      <div className="split">
        <section className="panel">
          <header className="panel__header">
            <h2 className="panel__title">Needs attention</h2>
            <button className="link" onClick={()=>onJump('starlinks')}>View all dishes {Icon.arrow}</button>
          </header>
          <table className="tbl">
            <thead><tr><th>Dish</th><th>Campus</th><th>Status</th><th>Obstruction</th><th>Latency</th><th></th></tr></thead>
            <tbody>

function Starlinks({ data, filter, onOpenDish }) {
  const [q, setQ] = uS('');
  const [sf, setSf] = uS('all');
  const rows = data.DISHES.filter(d => {
    if (filter.campus!=='all' && d.campus!==filter.campus) return false;
    if (sf!=='all' && d.status!==sf) return false;
    if (q && !(`${d.name} ${d.id}`.toLowerCase().includes(q.toLowerCase()))) return false;
    return true;
  });
  const counts = {
    all: data.DISHES.length,
    online: data.DISHES.filter(d=>d.status==='online').length,
    degraded: data.DISHES.filter(d=>d.status==='degraded').length,
    offline: data.DISHES.filter(d=>d.status==='offline').length,
    maintenance: data.DISHES.filter(d=>d.status==='maintenance'||d.status==='standby').length,
  };
  return (
    <div className="view">
      <div className="view__header">
        <div><div className="eyebrow">Connectivity</div><h1 className="view__title">Starlink dishes</h1></div>
        <div className="view__actions"><Search value={q} onChange={setQ} placeholder="Search dishes…" /><button className="btn">Export CSV</button></div>
      </div>
      <div className="tbl-toolbar">
        <Segmented value={sf} onChange={setSf} options={[
          {id:'all',label:'All',count:counts.all},{id:'online',label:'Online',count:counts.online},
          {id:'degraded',label:'Degraded',count:counts.degraded},{id:'offline',label:'Offline',count:counts.offline},
          {id:'maintenance',label:'Standby',count:counts.maintenance},
        ]} />

      </div>
      <section className="panel panel--flush">

          <tbody>
            {rows.map(d => (
              <tr key={d.id} onClick={()=>onOpenDish(d)} className="tbl__row--click">
                <td><div className="cell-primary">{d.name}</div><div className="cell-mono">{d.id} · {d.sku}</div></td>
                <td>{campusName(data,d.campus)}</td>

                <td className="num mono">{d.down||'—'}{d.down?' Mb':''}</td>
                <td className="num mono">{d.up||'—'}{d.up?' Mb':''}</td>

                <td className="num mono">{d.uptime.toFixed(2)}%</td>

                <td className="tbl__chev">{Icon.arrow}</td>

        </table>
      </section>
    </div>
  );
}

function Computers({ data, filter }) {
  const [q, setQ] = uS('');
  const [sf, setSf] = uS('all');
  const rows = data.COMPUTERS.filter(c => {
    if (filter.campus!=='all' && c.campus!==filter.campus) return false;
    if (sf!=='all' && c.status!==sf) return false;
    if (q) { const t=q.toLowerCase(); if (!(c.tag.toLowerCase().includes(t)||c.model.toLowerCase().includes(t)||(c.assignedTo&&c.assignedTo.toLowerCase().includes(t)))) return false; }
    return true;
  });
  const counts = s => data.COMPUTERS.filter(c=>s==='all'?true:c.status===s).length;
  return (
    <div className="view">
      <div className="view__header">
        <div><div className="eyebrow">Endpoints</div><h1 className="view__title">Computers</h1></div>
        <div className="view__actions"><Search value={q} onChange={setQ} placeholder="Tag, model, student…" /><button className="btn">Push update</button></div>
      </div>
      <div className="tbl-toolbar">
        <Segmented value={sf} onChange={setSf} options={[
          {id:'all',label:'All',count:counts('all')},{id:'healthy',label:'Healthy',count:counts('healthy')},
          {id:'needs-update',label:'Update due',count:counts('needs-update')},{id:'low-storage',label:'Low storage',count:counts('low-storage')},
          {id:'offline',label:'Offline',count:counts('offline')},{id:'critical',label:'Critical',count:counts('critical')},
        ]} />

      <section className="panel panel--flush">
        <table className="tbl tbl--data">
          <thead><tr><th>Tag</th><th>Assigned to</th><th>Model</th><th>OS</th><th>Status</th><th className="num">Storage</th><th className="num">Battery</th><th>Last seen</th></tr></thead>
          <tbody>
            {rows.slice(0,80).map(c => (
              <tr key={c.id}>
                <td><div className="cell-primary mono">{c.tag}</div><div className="cell-mono">{c.id}</div></td>
                <td>{c.assignedTo||<span className="muted">— unassigned —</span>}</td>
                <td>{c.model}<div className="cell-mono">{c.ram}GB · {c.vendor}</div></td>
                <td className="muted">{c.os}</td>
                <td><StatusChip status={c.status} /></td>
                <td className="num"><StorageBar pct={c.storage} /></td>
                <td className="num">{c.status==='offline'?'—':<BatteryCell pct={c.battery} />}</td>
                <td className="muted mono">{c.lastSeen}</td>
              </tr>
            ))}
          </tbody>
        </table>
        {rows.length>80 && <div className="tbl-footer muted">Showing 80 of {rows.length}</div>}
      </section>
    </div>
  );
}

function Students({ data, filter }) {
  const [q, setQ] = uS('');
  const [sf, setSf] = uS('all');
  const rows = data.STUDENTS.filter(s => {
    if (filter.campus!=='all' && s.campus!==filter.campus) return false;
    if (sf==='any' && s.issues.length===0) return false;
    if (sf==='connectivity' && !s.issues.includes('connectivity')) return false;
    if (sf==='laptop' && !s.issues.includes('laptop')) return false;
    if (sf==='missed' && !s.issues.includes('missed-sessions')) return false;
    if (q && !s.name.toLowerCase().includes(q.toLowerCase()) && !s.id.toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  });
  return (
    <div className="view">
      <div className="view__header">
        <div><div className="eyebrow">Learners</div><h1 className="view__title">Students</h1><p className="view__lede">Cohort 2026 · {data.STUDENTS.length} scholars across {data.CAMPUSES.length} campuses</p></div>
        <div className="view__actions"><Search value={q} onChange={setQ} placeholder="Name or ID…" /><button className="btn">Message selected</button></div>
      </div>
      <div className="tbl-toolbar">
        <Segmented value={sf} onChange={setSf} options={[
          {id:'all',label:'All'},{id:'any',label:'Any issue'},{id:'connectivity',label:'Connectivity'},
          {id:'laptop',label:'Laptop'},{id:'missed',label:'Missed sessions'},
        ]} />
        <span className="muted mono">{rows.length} of {data.STUDENTS.length}</span>
      </div>
      <section className="panel panel--flush">
        <table className="tbl tbl--data">
          <thead><tr><th>Student</th><th>Campus</th><th>Track</th><th>Issues</th><th className="num">Weekly hrs</th><th className="num">Attendance</th><th>Last active</th></tr></thead>
          <tbody>
            {rows.slice(0,80).map(s => (
              <tr key={s.id}>
                <td><div className="cell-primary">{s.name}</div><div className="cell-mono">{s.id}</div></td>
                <td>{campusName(data,s.campus)}</td>
                <td className="muted">{s.track}</td>
                <td>
                  {s.issues.length===0 && <span className="chip chip--ok"><StatusDot status="healthy"/>OK</span>}
                  {s.issues.map(i=><span key={i} className={`chip chip--${i==='missed-sessions'?'bad':'warn'}`}><StatusDot status={i==='missed-sessions'?'critical':'degraded'}/>{i.replace('-',' ')}</span>)}
                </td>
                <td className="num mono">{s.weeklyHours}h</td>
                <td className="num mono">{s.attendance}%</td>
                <td className="muted mono">{s.lastActive}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </section>
    </div>
  );
}

function Alerts({ data, setAlerts }) {
  const [only, setOnly] = uS('open');
  const rows = data.ALERTS.filter(a => only==='open'?!a.ack : only==='all'?true : a.severity===only);
  const ackOne = id => setAlerts(prev => prev.map(a => a.id===id?{...a,ack:true}:a));
  return (
    <div className="view">
      <div className="view__header"><div><div className="eyebrow">Triage</div><h1 className="view__title">Alerts</h1></div></div>
      <div className="tbl-toolbar">
        <Segmented value={only} onChange={setOnly} options={[
          {id:'open',label:'Open',count:data.ALERTS.filter(a=>!a.ack).length},
          {id:'critical',label:'Critical',count:data.ALERTS.filter(a=>a.severity==='critical').length},
          {id:'warning',label:'Warning',count:data.ALERTS.filter(a=>a.severity==='warning').length},
          {id:'info',label:'Info',count:data.ALERTS.filter(a=>a.severity==='info').length},
          {id:'all',label:'All',count:data.ALERTS.length},
        ]} />
      </div>
      <section className="panel panel--flush">
        <ul className="alerts">
          {rows.map(a => (
            <li key={a.id} className={`alert ${a.ack?'is-ack':''}`}>
              <div className="alert__sev"><span className={`sev sev--${a.severity}`}>{a.severity}</span><span className="mono muted">{a.ts}</span></div>
              <div className="alert__body">
                <div className="alert__msg">{a.message}</div>
                <div className="alert__meta mono muted">{a.source} · {campusName(data,a.campus)}{a.assignee?<> · {a.assignee}</>:null}</div>
              </div>
              <div className="alert__actions">
                {a.ack
                  ? <span className="chip chip--mute"><StatusDot status="standby"/>Acknowledged</span>
                  : <><button className="btn btn--sm">Assign</button><button className="btn btn--sm btn--primary" onClick={()=>ackOne(a.id)}>Acknowledge</button></>
                }
              </div>
            </li>
          ))}
          {rows.length===0 && <li className="empty">Nothing here. Inbox zero.</li>}
        </ul>
      </section>
    </div>
  );
}

function Campuses({ data }) {
  return (
    <div className="view">
      <div className="view__header"><div><div className="eyebrow">Sites</div><h1 className="view__title">Campuses</h1></div></div>
      <div className="cards cards--2">
        {data.CAMPUSES.map(c => {
          const dishes = data.DISHES.filter(d=>d.campus===c.id);
          const pcs = data.COMPUTERS.filter(p=>p.campus===c.id);
          const studs = data.STUDENTS.filter(s=>s.campus===c.id);
          const online = dishes.filter(d=>d.status==='online').length;
          return (
            <div key={c.id} className="panel panel--pad">
              <div className="campus-card__head">
                <div><h3 className="panel__title">{c.name}</h3><div className="muted">{c.region}</div></div>
                <div className="campus-card__count">{studs.length}<span>students</span></div>
              </div>
              <div className="campus-stats">
                <Stat label="Dishes online" value={`${online}/${dishes.length}`} />
                <Stat label="Computers" value={pcs.length} sub={`${pcs.filter(p=>p.status==='healthy').length} healthy`} />
                <Stat label="Active issues" value={studs.filter(s=>s.issues.length).length} tone={studs.filter(s=>s.issues.length).length?'warn':'ok'} />
              </div>
              <div className="dish-mini">
                {dishes.map(d => (
                  <div key={d.id} className="dish-mini__item" title={`${d.name} — ${d.status}`}>
                    <StatusDot status={d.status} size={8} /><span className="mono">{d.name}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

window._VIEWS = { Overview, Starlinks, Computers, Students, Alerts, Campuses, MiniBar, StorageBar, BatteryCell };

function project(lat, lng) {
  if (lat == null || lng == null) return { x: -999, y: -999 };
  const x = ((lng - RW_BOUNDS.minLng) / (RW_BOUNDS.maxLng - RW_BOUNDS.minLng)) * 1000;
  const y = ((RW_BOUNDS.maxLat - lat)  / (RW_BOUNDS.maxLat - RW_BOUNDS.minLat)) * 800;
  return { x: Math.round(x), y: Math.round(y) };
}

function campusHealth(data, campusId) {
  const dishes   = data.DISHES.filter(d => d.campus === campusId);
  const offline  = dishes.filter(d => d.status === 'offline').length;
  const degraded = dishes.filter(d => d.status === 'degraded').length;
  const pcs      = data.COMPUTERS.filter(c => c.campus === campusId);
  let tone = 'ok';
  if (offline > 0) tone = 'bad';
  else if (degraded > 0) tone = 'warn';
  return {
    tone, offline, degraded,
    dishes: dishes.length, onlineDishes: dishes.length - offline - degraded,
    pcs: pcs.length, studs: 0, impacted: 0,
  };
}

function PinTooltip({ p, flip }) {
  // flip: show label to the left when pin is near right edge
  const W = p.name.length * 7 + 20, H = 34;
  const ox = flip ? -(W + 12) : 14;
  const oy = -H / 2;
  const tc = p.health.tone === 'ok' ? 'var(--ok)' : p.health.tone === 'warn' ? 'var(--warn)' : 'var(--bad)';
  return (
    <g transform={`translate(${p.x + ox} ${p.y + oy})`} style={{ pointerEvents: 'none' }}>
      <rect width={W} height={H} rx="2" fill="var(--surface)" stroke={tc} strokeWidth="1.5"
        style={{ filter: 'drop-shadow(0 2px 6px rgba(0,0,0,.18))' }} />
      <text x="10" y="14" fontSize="12" fill="var(--ink)" fontFamily="var(--font-ui)" fontWeight="600">{p.name}</text>
      <text x="10" y="27" fontSize="10" fill="var(--muted)" fontFamily="var(--font-mono)" letterSpacing="0.05em">
        {p.health.onlineDishes}/{p.health.dishes} DISHES · {p.health.pcs} PCS
      </text>
    </g>
  );
}

function MapView({ data, onOpenDish, onJump }) {
  const [hovered,  setHovered]  = mUS(null);
  const [selected, setSelected] = mUS(null);

  // Auto-select first campus once data loads
  mUE(() => {
    if (selected === null && data.CAMPUSES.length > 0) {
      setSelected(data.CAMPUSES[0].id);
    }
  }, [data.CAMPUSES.length]);

  const pins = mUM(() => data.CAMPUSES.map(c => {
    const { x, y } = project(c.lat, c.lng);
    return { ...c, x, y, health: campusHealth(data, c.id) };
  }), [data]);

  const cityPts = mUM(() => CITIES.map(c => ({ ...c, ...project(c.lat, c.lng) })), []);

  const sel      = pins.find(p => p.id === selected) || null;
  const selDishes = data.DISHES.filter(d => d.campus === selected);

  const toneChip = !sel ? 'mute'
    : sel.health.tone === 'ok'   ? 'ok'
    : sel.health.tone === 'warn' ? 'warn' : 'bad';
  const toneLabel = !sel ? '—'
    : sel.health.tone === 'ok'   ? 'Healthy'
    : sel.health.tone === 'warn' ? 'Needs attention' : 'Critical';

  return (
    <div className="view">
      <div className="view__header">
        <div>
          <div className="eyebrow">Geography</div>
          <h1 className="view__title">Sites across Rwanda</h1>
          <p className="view__lede">
            {pins.length} Isomo sites. Click a pin to inspect. Color = aggregate health.
          </p>
        </div>
        <div className="view__actions">
          <div className="map-legend">
            <span><MSDot status="online" /> Healthy</span>
            <span><MSDot status="degraded" /> Warning</span>
            <span><MSDot status="offline" /> Critical</span>
          </div>
        </div>
      </div>

      {/* ── Map + side panel ── */}
      <section className="panel map-wrap">

        {/* ── SVG map ── */}
        <div className="map-stage">
          <svg viewBox="0 0 1000 800" className="map-svg" preserveAspectRatio="xMidYMid slice">
            <defs>
              <filter id="pinShadow" x="-50%" y="-50%" width="200%" height="200%">
                <feDropShadow dx="0" dy="1" stdDeviation="2" floodOpacity="0.2" />
              </filter>
              {/* Clip lakes to Rwanda's border so they don't bleed outside */}
              <clipPath id="rwandaClip">

              {RW_PROVINCES.map(p => (
                <path key={'a' + p.id} d={p.d} fill="none" stroke="var(--accent-soft)" strokeWidth="3.5" strokeLinejoin="round" />
              ))}
            </g>

            {/* Lakes — clipped to Rwanda boundary */}
            <g clipPath="url(#rwandaClip)">
              {LAKES.map(l => (
                <ellipse key={l.label} cx={l.cx} cy={l.cy} rx={l.rx} ry={l.ry}
                  fill="#b8d4e8" stroke="#9cbdd4" strokeWidth="1" opacity="0.7" />
              ))}
            </g>
            {/* Lake labels outside clip so text is always readable */}
            {LAKES.map(l => (
              <text key={l.label + '-lbl'} x={l.lx} y={l.ly} fontSize="10" fill="#7899aa"
                fontFamily="var(--font-mono)" letterSpacing="0.1em" textAnchor="middle">
                {l.label}
              </text>
            ))}

            {/* City reference dots */}
            {cityPts.map(c => (
              <g key={c.name}>
                <circle cx={c.x} cy={c.y} r="3" fill="var(--ink-3)" />
                <text x={c.x + 7} y={c.y + 4} fontSize="11" fill="var(--ink-3)"
                  fontFamily="var(--font-mono)" letterSpacing="0.04em">{c.name}</text>
              </g>
            ))}

            {/* Connector line to selected */}
            {sel && (
              <line x1={sel.x} y1={sel.y} x2={sel.x} y2={sel.y - 36}
                stroke="var(--accent)" strokeWidth="1.5" strokeDasharray="3 4" opacity="0.7" />
            )}

            {/* Pins — render selected/hovered last so they sit on top */}
            {[...pins].sort((a,b) => {
              const rank = id => id === selected ? 2 : id === hovered ? 1 : 0;
              return rank(a.id) - rank(b.id);
            }).map(p => {
              const isSel = p.id === selected, isHov = p.id === hovered;
              const tc = p.health.tone === 'ok' ? 'var(--ok)' : p.health.tone === 'warn' ? 'var(--warn)' : 'var(--bad)';
              // All pins share the same outer ring size — only stroke + inner dot change
              const OUTER = 12, INNER = isSel ? 7 : 5;
              const sw    = isSel ? 2.5 : isHov ? 2 : 1.5;
              const showLabel = isSel || isHov;
              const flipLabel = p.x > 800;
              return (
                <g key={p.id}
                  onMouseEnter={() => setHovered(p.id)}
                  onMouseLeave={() => setHovered(null)}
                  onClick={() => setSelected(p.id)}
                  style={{ cursor: 'pointer' }}>

                  {/* Pulse ring for critical sites — same base size */}
                  {p.health.tone === 'bad' && (
                    <circle cx={p.x} cy={p.y} r={OUTER + 4} fill={tc} opacity="0.12">
                      <animate attributeName="r" values={`${OUTER+4};${OUTER+14};${OUTER+4}`} dur="2.4s" repeatCount="indefinite" />
                      <animate attributeName="opacity" values="0.2;0;0.2" dur="2.4s" repeatCount="indefinite" />
                    </circle>
                  )}

                  {/* Outer ring — always r=OUTER */}
                  <circle cx={p.x} cy={p.y} r={OUTER} fill="var(--surface)"
                    stroke={tc} strokeWidth={sw} filter="url(#pinShadow)" />
                  {/* Inner dot — slightly larger when selected */}
                  <circle cx={p.x} cy={p.y} r={INNER} fill={tc} opacity={isHov || isSel ? 1 : 0.9} />

                  {/* Tooltip — only on hover or selection */}
                  {showLabel && <PinTooltip p={p} flip={flipLabel} />}
                </g>
              );
            })}

            {/* Scale bar */}
            <g transform="translate(40 755)" fontFamily="var(--font-mono)">
              <line x1="0" y1="0" x2="70" y2="0" stroke="var(--ink-3)" strokeWidth="1.5" />
              <line x1="0" y1="-4" x2="0" y2="4" stroke="var(--ink-3)" strokeWidth="1.5" />
              <line x1="70" y1="-4" x2="70" y2="4" stroke="var(--ink-3)" strokeWidth="1.5" />
              <text x="35" y="16" fontSize="10" fill="var(--muted)" textAnchor="middle" letterSpacing="0.08em">50 KM</text>
            </g>

            {/* Compass */}
            <g transform="translate(950 55)">
              <circle r="14" fill="var(--surface)" stroke="var(--rule)" strokeWidth="1" opacity="0.85"/>
              <path d="M 0 -10 L 3.5 0 L 0 10 L -3.5 0 Z" fill="var(--accent)" />
              <text y="-18" fontSize="10" fill="var(--muted)" textAnchor="middle"
                letterSpacing="0.1em" fontFamily="var(--font-mono)">N</text>
            </g>
          </svg>
        </div>

        {/* ── Side panel ── */}
        <aside className="map-side">
          {sel ? (
            <>
              <div className="map-side__header">
                <div style={{ minWidth: 0 }}>
                  <div className="eyebrow">Selected site</div>
                  <h3 className="map-side__title" style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    {sel.name}
                  </h3>
                  {sel.lat != null && (
                    <div className="muted" style={{ fontSize: 11, fontFamily: 'var(--font-mono)', marginTop: 2 }}>
                      {Math.abs(sel.lat).toFixed(4)}°S · {Math.abs(sel.lng).toFixed(4)}°E
                    </div>
                  )}
                </div>
                <span className={`chip chip--${toneChip}`} style={{ flexShrink: 0 }}>
                  <MSDot status={sel.health.tone === 'ok' ? 'healthy' : sel.health.tone === 'warn' ? 'degraded' : 'offline'} />
                  {toneLabel}
                </span>
              </div>

              <div className="map-side__stats">
                <MStat label="Dishes"    value={`${sel.health.onlineDishes}/${sel.health.dishes}`} sub="online" />
                <MStat label="Computers" value={sel.health.pcs} sub="registered" />
                <MStat label="Alerts"    value={sel.health.offline + sel.health.degraded || '—'} sub="open" tone={sel.health.offline > 0 ? 'bad' : sel.health.degraded > 0 ? 'warn' : null} />
              </div>

              <div className="map-side__section">
                <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--muted)', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>
                  Starlink at this site
                </div>
                {selDishes.length === 0 ? (
                  <div style={{ color: 'var(--muted)', fontSize: 12 }}>No dishes configured</div>
                ) : (
                  <ul className="drawer-list">
                    {selDishes.map(d => (
                      <li key={d.id} onClick={() => onOpenDish(d)} style={{ cursor: 'pointer' }}>
                        <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11 }}>{d.id}</span>
                        <span className="muted" style={{ fontSize: 11 }}>{d.latency ? d.latency + ' ms' : '—'}</span>
                        <MSChip status={d.status} />
                      </li>
                    ))}
                  </ul>
                )}
              </div>

              <div className="map-side__foot">
                <button className="btn" onClick={() => onJump('starlinks')}>Starlinks →</button>
                <button className="btn" onClick={() => onJump('alerts')}>Alerts →</button>
              </div>
            </>
          ) : (
            <div style={{ color: 'var(--muted)', fontSize: 13, padding: '24px 0' }}>
              Click a pin to inspect a site.
            </div>
          )}
        </aside>
      </section>

      {/* ── All sites table ── */}
      <section className="panel">
        <header className="panel__header">
          <h2 className="panel__title">All sites</h2>
          <span className="muted" style={{ fontFamily: 'var(--font-mono)', fontSize: 11 }}>{pins.length} sites</span>
        </header>
        <table className="tbl">
          <thead>
            <tr>
              <th>Site</th>
              <th>Coordinates</th>
              <th>Status</th>
              <th className="num">Dishes</th>
              <th className="num">PCs</th>
            </tr>
          </thead>
          <tbody>
            {pins.map(p => (
              <tr key={p.id} onClick={() => setSelected(p.id)}
                className={`tbl__row--click ${p.id === selected ? 'is-selected' : ''}`}>
                <td><div className="cell-primary">{p.name}</div></td>
                <td>
                  {p.lat != null
                    ? <span style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--muted)' }}>
                        {Math.abs(p.lat).toFixed(4)}°S, {Math.abs(p.lng).toFixed(4)}°E
                      </span>
                    : <span className="muted">—</span>
                  }
                </td>
                <td>
                  <span className={`chip chip--${p.health.tone === 'ok' ? 'ok' : p.health.tone === 'warn' ? 'warn' : 'bad'}`}>
                    <MSDot status={p.health.tone === 'ok' ? 'healthy' : p.health.tone === 'warn' ? 'degraded' : 'offline'} />
                    {p.health.tone === 'ok' ? 'Online' : p.health.tone === 'warn' ? 'Degraded' : 'Offline'}
                  </span>
                </td>
                <td className="num mono">{p.health.onlineDishes}/{p.health.dishes}</td>
                <td className="num mono">{p.health.pcs || '—'}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </section>
    </div>
  );
}
window._MapView = MapView;
  </script>

  <!-- ── App shell ── -->
  <script type="text/babel">
const { useState: aUS, useEffect: aUE } = React;
const { Icon: AppIcon, usePersisted } = window._SF;
const { Overview, Starlinks, Computers, Students, Alerts, Campuses } = window._VIEWS;
const DishDetail = window._DishDetail;
const MapView = window._MapView;

const TWEAK_DEFAULTS = {
  theme: 'light', accent: 'terracotta', typePairing: 'serif-sans',
  density: 'default', sidebar: 'wide', monochromeStatus: false,
  landingTab: 'overview', showTopPulse: true,
};
const ACCENTS = {
  terracotta: { light:'#c8553d', dark:'#e8856f', soft_l:'#f4d9cf', soft_d:'#3b2019', ink_l:'#8c3422', ink_d:'#f7b9a8' },
  indigo:     { light:'#3b5bdb', dark:'#8aa0ff', soft_l:'#dbe0fa', soft_d:'#1a2150', ink_l:'#1e3a8a', ink_d:'#c0cdff' },
  forest:     { light:'#3e7d4a', dark:'#7ab389', soft_l:'#d9e8d8', soft_d:'#1d3626', ink_l:'#1f4a2a', ink_d:'#b8dcbd' },
  ochre:      { light:'#b7791f', dark:'#e6b86b', soft_l:'#f2e3c4', soft_d:'#3a2c13', ink_l:'#7a4e10', ink_d:'#f5d494' },
  ink:        { light:'#141414', dark:'#f2ede0', soft_l:'#e6e1d3', soft_d:'#1e2d46', ink_l:'#000',    ink_d:'#fff'    },
};
const TYPE_PAIRINGS = {
  'serif-sans': { serif:"'Newsreader', Georgia, serif",   ui:"'Inter', system-ui, sans-serif" },
  'all-sans':   { serif:"'Inter', system-ui, sans-serif", ui:"'Inter', system-ui, sans-serif" },
  'mono-heavy': { serif:"'IBM Plex Mono', monospace",     ui:"'IBM Plex Sans', system-ui, sans-serif" },
  'editorial':  { serif:"'Playfair Display', Georgia, serif", ui:"'Inter', system-ui, sans-serif" },
};

function NavItem({ icon, label, active, onClick, count }) {
  return (
    <button className={`nav__item ${active?'is-active':''}`} onClick={onClick}>
      {icon}<span className="side__label">{label}</span>
      {count !== undefined && <span className="nav__count side__label">{count}</span>}
    </button>
  );
}
function Choices({ label, value, onChange, options }) {
  return (
    <div className="tweaks__row">
      <label>{label}</label>
      <div className="tweaks__choices">
        {options.map(([v,l]) => (
          <button key={v} className={`tweaks__choice ${value===v?'is-active':''}`} onClick={()=>onChange(v)}>{l}</button>
        ))}
      </div>
    </div>
  );
}

// ── Login screen ──────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = aUS('');
  const [pass,  setPass]  = aUS('');
  const [base,  setBase]  = aUS(window._API.getBase());
  const [err,   setErr]   = aUS('');
  const [busy,  setBusy]  = aUS(false);

  async function handleSubmit(e) {
    e.preventDefault();
    setBusy(true); setErr('');
    try {
      await window._API.doLogin(email, pass, base);
      onLogin();
    } catch (ex) {
      setErr(ex.message);
    } finally {
      setBusy(false);
    }
  }

  return (
    <div className="login-screen">
      <div className="login-card">
        <div className="login-logo">
          <div className="login-logo__mark">S</div>
          <h1>Starfleet</h1>
          <p>Isomo Ops</p>
        </div>
        <form onSubmit={handleSubmit}>
          <label>
            Email
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
              placeholder="ops@isomo.rw" autoFocus required />
          </label>
          <label>
            Password
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)} required />
          </label>
          <label style={{marginTop:4}}>
            API URL
            <input type="url" value={base} onChange={e=>setBase(e.target.value)} />
          </label>
          {err && <div className="login-error">{err}</div>}
          <button type="submit" className="btn-primary" disabled={busy} style={{marginTop:4}}>
            {busy ? 'Signing in…' : 'Sign in'}
          </button>
        </form>
      </div>
    </div>
  );
}

function App() {
  const [authed, setAuthed] = aUS(window._API.isAuthed());
  const [sites,   setSites]   = aUS([]);
  const [devices, setDevices] = aUS([]);
  const [loading, setLoading] = aUS(false);
  const [loadErr, setLoadErr] = aUS(null);
  const [tweaks, setTweaks] = usePersisted('starfleet.tweaks', TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = aUS(false);
  const [tab, setTab] = usePersisted('starfleet.tab', tweaks.landingTab || 'overview');
  const [campus, setCampus] = aUS('all');
  const [dish, setDish] = aUS(null);
  const [ackedAlerts, setAckedAlerts] = aUS({});

  // Expose logout handler — must be set before loadAll fires
  window._SF_LOGOUT = () => { setAuthed(false); setSites([]); setDevices([]); setLoadErr(null); };
  aUE(() => {
    return () => { window._SF_LOGOUT = null; };
  }, []);

  // Load data from real API
  const loadAll = async () => {
    setLoading(true);
    setLoadErr(null);
    try {
      const [s, d] = await Promise.all([
        window._API.apiFetch('/api/sites'),
        window._API.apiFetch('/api/devices').catch(() => []),
      ]);
      setSites(s);
      setDevices(d);
    } catch (e) {
      console.error('[Starfleet]', e.message);
      // Don't overwrite error on session expiry (logout already triggered)
      if (!e.message.includes('Session expired')) setLoadErr(e.message);
    } finally {
      setLoading(false);
    }
  };

  // Boot: load + poll + WebSocket
  aUE(() => {
    if (!authed) return;
    loadAll();
    const pollTimer = setInterval(loadAll, 30_000);

    // WebSocket
    try {
      const wsUrl = window._API.getBase().replace(/^http/, 'ws') + '?token=' + encodeURIComponent(localStorage.getItem('sf_tok') || '');
      const ws = new WebSocket(wsUrl);
      ws.onmessage = e => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'signal_update') {
            setSites(prev => prev.map(s => s.id === msg.site_id ? { ...s, signal: { ...s.signal, ...msg.signal } } : s));
          }
          if (msg.type === 'device_online') {
            window._API.apiFetch('/api/devices').then(setDevices).catch(() => {});
          }
          if (msg.type === 'stale_devices') {
            const staleIds = new Set(msg.devices.map(d => d.device_id));
            const staleMins = new Map(msg.devices.map(d => [d.device_id, d.stale_min]));
            setDevices(prev => prev.map(d => staleIds.has(d.id)
              ? { ...d, status: 'stale', stale_min: staleMins.get(d.id) ?? null }
              : d));
          }
        } catch { /* ignore malformed frames */ }
      };
      ws.onclose = () => {};
      ws.onerror = () => {};
    } catch { /* WS unavailable — polling keeps data fresh */ }

    return () => clearInterval(pollTimer);
  }, [authed]);

  // Theme / accent / type
  aUE(() => {
    const root = document.documentElement;
    root.setAttribute('data-theme', tweaks.theme==='dark'?'dark':'light');
    const a = ACCENTS[tweaks.accent] || ACCENTS.terracotta;
    root.style.setProperty('--accent',      tweaks.theme==='dark'?a.dark:a.light);
    root.style.setProperty('--accent-soft', tweaks.theme==='dark'?a.soft_d:a.soft_l);
    root.style.setProperty('--accent-ink',  tweaks.theme==='dark'?a.ink_d:a.ink_l);
    const t = TYPE_PAIRINGS[tweaks.typePairing] || TYPE_PAIRINGS['serif-sans'];
    root.style.setProperty('--font-serif', t.serif);
    root.style.setProperty('--font-ui', t.ui);
    document.body.style.fontFamily = t.ui;
  }, [tweaks.theme, tweaks.accent, tweaks.typePairing]);

  const patch = upd => setTweaks(prev => ({...prev,...upd}));

  if (!authed) return <LoginScreen onLogin={() => { setAuthed(true); }} />;

  // Map real API data to view-compatible shape
  const { CAMPUSES, DISHES } = window._MAPPERS.mapSites(sites);
  const COMPUTERS = window._MAPPERS.mapDevices(devices);
  const STUDENTS  = [];
  const baseAlerts = window._MAPPERS.buildAlerts(DISHES);
  const ALERTS = baseAlerts.map(a => ({ ...a, ack: ackedAlerts[a.id] ?? false }));

  const liveData = { CAMPUSES, DISHES, COMPUTERS, STUDENTS, ALERTS };

  const onlineDishes = DISHES.filter(d=>d.status==='online').length;
  const fleetUptime = DISHES.length
    ? (DISHES.reduce((s,d)=>s+(d.uptime||0),0)/DISHES.length).toFixed(2)
    : '—';
  const openAlertCount = ALERTS.filter(a=>!a.ack).length;
  const criticalCount  = ALERTS.filter(a=>!a.ack&&a.severity==='critical').length;

  function handleSetAlerts(updater) {
    // Only ack state is local; propagate ack changes
    const updated = typeof updater === 'function' ? updater(ALERTS) : updater;
    const newAcked = {...ackedAlerts};
    updated.forEach(a => { if (a.ack) newAcked[a.id] = true; });
    setAckedAlerts(newAcked);
  }

  const appClass = [
    'app',
    tweaks.sidebar==='tight'?'is-tight':'',
    tweaks.density==='cozy'?'density-cozy':tweaks.density==='dense'?'density-dense':'',
    tweaks.monochromeStatus?'mono-status':'',
  ].filter(Boolean).join(' ');

  return (
    <div className={appClass}>
      <aside className="side">
        <div className="side__head">
          <div className="side__logo" aria-hidden>S</div>
          <div className="side__head__name">Starfleet<small>Isomo Ops</small></div>
        </div>
        <div>
          <div className="side__section-label side__label">Operations</div>
          <nav className="nav">
            <NavItem icon={AppIcon.overview} label="Overview"  active={tab==='overview'}  onClick={()=>setTab('overview')} />
            <NavItem icon={AppIcon.dish}     label="Starlinks" active={tab==='starlinks'} onClick={()=>setTab('starlinks')} count={`${onlineDishes}/${liveData.DISHES.length}`} />
            <NavItem icon={AppIcon.laptop}   label="Computers" active={tab==='computers'} onClick={()=>setTab('computers')} count={liveData.COMPUTERS.length} />
            <NavItem icon={AppIcon.user}     label="Students"  active={tab==='students'}  onClick={()=>setTab('students')}  count={liveData.STUDENTS.length} />
            <NavItem icon={AppIcon.bell}     label="Alerts"    active={tab==='alerts'}    onClick={()=>setTab('alerts')}    count={openAlertCount||'—'} />
            <NavItem icon={AppIcon.campus}   label="Campuses"  active={tab==='campuses'}  onClick={()=>setTab('campuses')} />
            <NavItem icon={AppIcon.map}      label="Map"       active={tab==='map'}       onClick={()=>setTab('map')} />
          </nav>
        </div>
        <div className="side__foot">
          <div className="side__pulse">
            <div className="side__pulse__label">Fleet uptime · 30d</div>
            <div className="side__pulse__value">{fleetUptime}<span style={{fontSize:14,color:'var(--muted)'}}>%</span></div>
            <div className="side__pulse__sub">{onlineDishes}/{liveData.DISHES.length} dishes online</div>
          </div>
        </div>
      </aside>

      <main className="main">
        <header className="top">
          <div className="top__crumbs">
            <strong>Isomo Academy</strong><span>/</span>
            <span>{tab[0].toUpperCase()+tab.slice(1)}</span>
          </div>
          <div className="top__spacer" />
          {tweaks.showTopPulse && (
            <div className="top__pulse">
              <div className="top__pulse__item">
                <span className="lbl">Status</span>
                <span className="val">{criticalCount?'⚠ '+criticalCount+' critical':'All systems normal'}</span>
              </div>
              <div className="top__pulse__item"><span className="lbl">Now</span><span className="val">Kigali CAT</span></div>
            </div>
          )}
          <select className="top__campus" value={campus} onChange={e=>setCampus(e.target.value)} aria-label="Filter by campus">
            <option value="all">All campuses</option>
            {liveData.CAMPUSES.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <button className="icon-btn" onClick={()=>patch({theme:tweaks.theme==='dark'?'light':'dark'})} aria-label="Toggle theme" title="Toggle theme">
            {tweaks.theme==='dark'?AppIcon.sun:AppIcon.moon}
          </button>
          <button className="icon-btn" onClick={()=>setTweaksOpen(o=>!o)} aria-label="Tweaks" title="Tweaks" style={{fontSize:'11px',fontFamily:'var(--font-mono)'}}>⚙</button>
          <button className="icon-btn" title="Sign out" onClick={()=>{ window._API.doLogout(); setAuthed(false); setSites([]); setDevices([]); }} style={{fontSize:'11px',fontFamily:'var(--font-mono)'}}>⏻</button>
        </header>
        {loading && sites.length === 0 && (
          <div style={{padding:'60px 28px',textAlign:'center',color:'var(--muted)',fontFamily:'var(--font-mono)',fontSize:12,letterSpacing:'0.08em'}}>
            LOADING FLEET DATA…
          </div>
        )}

        {loadErr && (
          <div style={{
            margin:'24px 28px 0',padding:'14px 18px',borderRadius:0,
            background:'var(--bad-soft,#fde8e8)',border:'1px solid var(--bad,#b13c3c)',
            fontFamily:'var(--font-mono)',fontSize:12,color:'var(--bad,#b13c3c)',
            display:'flex',alignItems:'center',gap:16,flexWrap:'wrap',
          }}>
            <span style={{flex:1}}>⚠ {loadErr}</span>
            <button className="btn btn--sm" onClick={loadAll} style={{whiteSpace:'nowrap'}}>Retry</button>
            <button className="btn btn--sm" onClick={() => {
              localStorage.removeItem('sf_tok');
              localStorage.removeItem('sf_base');
              window.location.reload();
            }} style={{whiteSpace:'nowrap'}}>Sign in again</button>
          </div>
        )}

        {tab==='overview'  && <Overview  data={liveData} ui={tweaks} onOpenDish={setDish} onJump={setTab} />}
        {tab==='starlinks' && <Starlinks data={liveData} filter={{campus}} onOpenDish={setDish} />}
        {tab==='computers' && <Computers data={liveData} filter={{campus}} />}
        {tab==='students'  && <Students  data={liveData} filter={{campus}} />}
        {tab==='alerts'    && <Alerts    data={liveData} setAlerts={handleSetAlerts} />}
        {tab==='campuses'  && <Campuses  data={liveData} />}
        {tab==='map'       && <MapView   data={liveData} onOpenDish={setDish} onJump={setTab} />}
      </main>

      <DishDetail dish={dish} data={liveData} onClose={()=>setDish(null)} />

      {tweaksOpen && (
        <div className="tweaks">
          <div className="tweaks__head">
            <h3 className="tweaks__title">Tweaks</h3>
            <button className="icon-btn" onClick={()=>setTweaksOpen(false)} aria-label="Close">{AppIcon.close}</button>
          </div>
          <Choices label="Theme" value={tweaks.theme} onChange={v=>patch({theme:v})} options={[['light','Light'],['dark','Dark']]} />
          <div className="tweaks__row">
            <label>Accent color</label>
            <div className="tweaks__swatches">
              {Object.entries(ACCENTS).map(([k,v]) => (
                <button key={k} className={`tweaks__sw ${tweaks.accent===k?'is-active':''}`}
                  style={{background:tweaks.theme==='dark'?v.dark:v.light}} onClick={()=>patch({accent:k})} aria-label={k} />
              ))}
            </div>
          </div>
          <Choices label="Type pairing" value={tweaks.typePairing} onChange={v=>patch({typePairing:v})}
            options={[['serif-sans','Serif + Sans'],['all-sans','All sans'],['mono-heavy','Mono display'],['editorial','Editorial']]} />
          <Choices label="Density" value={tweaks.density} onChange={v=>patch({density:v})}
            options={[['cozy','Cozy'],['default','Default'],['dense','Dense']]} />
          <Choices label="Sidebar" value={tweaks.sidebar} onChange={v=>patch({sidebar:v})}
            options={[['wide','Wide'],['tight','Icons only']]} />
          <label className="tweaks__toggle">
            <input type="checkbox" checked={!!tweaks.monochromeStatus} onChange={e=>patch({monochromeStatus:e.target.checked})} />
            Monochrome status chips
          </label>
          <label className="tweaks__toggle">
            <input type="checkbox" checked={!!tweaks.showTopPulse} onChange={e=>patch({showTopPulse:e.target.checked})} />
            Show top-bar status
          </label>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
