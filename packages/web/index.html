<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#34b483" />
    <meta name="description" content="Starfleet — Isomo EdTech Fleet Operations Dashboard. Monitor Starlink terminals and laptop inventory across Rwanda." />
    <title>Starfleet · Isomo Ops</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.17.0/dist/tabler-icons.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script>
      // Apply saved theme before React renders to prevent flash
      (function () {
        const h = document.documentElement;
        const light = new Set(["warm-paper", "chalk", "stone"]);
        const p = localStorage.getItem("sf_palette") || "field-green";
        h.dataset.palette = p;
        h.dataset.typeset = localStorage.getItem("sf_typeset") || "editorial";
        h.dataset.density = localStorage.getItem("sf_density") || "comfortable";
        h.dataset.contrast = localStorage.getItem("sf_contrast") || "normal";
        h.dataset.theme = light.has(p) ? "light" : "dark";
        const acc = localStorage.getItem("sf_accent");
        if (acc) h.dataset.accentColor = acc;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
