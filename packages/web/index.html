/* Starfleet — operator dashboard stylesheet
   Theme: warm field-paper (light) / green-black instrument dark, field-green accent.
   Type: Newsreader (serif titles) + Inter (UI) + IBM Plex Mono (numbers).
*/
:root {
  --bg:       #f3f6f1;
  --bg-2:     #e8eee8;
  --surface:  #fbfcf8;
  --surface-2:#eef4ee;
  --ink:      #222b27;
  --ink-2:    #44514b;
  --ink-3:    #68756e;
  --muted:    #84908a;
  --rule:     #cfd9d2;
  --rule-2:   #dfe6e1;

  --accent:         #24825f;
  --accent-ink:     #0e3d2b;
  --accent-soft:    #d7eadf;

  --ok:      #347a56;
  --ok-soft: #dceade;
  --warn:    #9b6f18;
  --warn-soft:#eee1bd;
  --bad:     #b45142;
  --bad-soft:#edd5d1;
  --mute:    #84908a;
  --mute-soft:#e4ebe5;

  --radius: 0px;
  --row-pad: 14px 16px;
  --panel-pad: 20px;
  --shadow-sm: 0 1px 0 var(--rule-2);

  --font-ui:    'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-serif: 'Newsreader', 'Iowan Old Style', 'Palatino', Georgia, serif;
  --font-mono:  'IBM Plex Mono', ui-monospace, Menlo, monospace;
}

[data-theme="dark"] {
  --bg:       #141f1c;
  --bg-2:     #17251f;
  --surface:  #1b2b24;
  --surface-2:#22332b;
  --ink:      #e6efe9;
  --ink-2:    #b8c5be;
  --ink-3:    #7c8a84;
  --muted:    #66746d;
  --rule:     #33443c;
  --rule-2:   #26362f;

  --accent:      #34b483;
  --accent-ink:  #10241b;
  --accent-soft: #15382a;

  --ok:      #5fc28e;
  --ok-soft: #183526;
  --warn:    #d9a441;
  --warn-soft:#392d14;
  --bad:     #cf5b48;
  --bad-soft:#3b1e1a;
  --mute:    #7c8a84;
  --mute-soft:#22312b;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow-x: hidden; }
body {
  font-family: var(--font-ui);
  color: var(--ink);
  background: var(--bg);
  font-size: 13.5px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.mono { font-family: var(--font-mono); font-feature-settings: 'tnum' 1; font-size: .92em; letter-spacing: 0; }
.muted { color: var(--muted); }
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}
.eyebrow {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

/* ——— Shell ——— */
.app {
  display: grid;
  grid-template-columns: 232px 1fr;
  min-height: 100vh;
}
.app.is-tight { grid-template-columns: 64px 1fr; }
.app.is-tight .side__label { display: none; }
.app.is-tight .side__head__name { display: none; }

.side {
  border-right: 1px solid var(--rule);
  background: var(--bg);
  padding: 22px 14px;
  position: sticky; top: 0;
  height: 100vh;
  display: flex; flex-direction: column;
  gap: 24px;
}
.side__head {
  display: flex; align-items: center; gap: 10px;
  padding: 0 6px 14px;
  border-bottom: 1px solid var(--rule);
}
.side__logo {
  width: 28px; height: 28px;
  background: var(--ink);
  color: var(--bg);
  display: grid; place-items: center;
  font-family: var(--font-serif);
  font-weight: 500;
  font-size: 16px;
  letter-spacing: -0.02em;
}
.side__head__name {
  font-family: var(--font-serif);
  font-size: 17px;
  letter-spacing: -0.01em;
}
.side__head__name small { display: block; font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 1px; }

.side__section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--muted);
  padding: 0 10px;
  margin-bottom: 6px;
}
.nav { display: flex; flex-direction: column; gap: 1px; }
.nav__icon { width: 18px; height: 18px; display: inline-grid; place-items: center; flex-shrink: 0; }
.nav__icon svg { width: 17px; height: 17px; display: block; }
.nav__item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  color: var(--ink-2);
  background: transparent;
  border: 0;
  text-align: left;
  width: 100%;
  cursor: pointer;
  font-size: 13.5px;
  font-family: inherit;
  position: relative;
}
.nav__item:hover { background: var(--bg-2); color: var(--ink); }
.nav__item.is-active {
  background: var(--surface);
  color: var(--ink);
  border-left: 1px solid var(--accent);
}
.nav__item .nav__count { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
.nav__item.is-active .nav__count { color: var(--accent); }

.side__foot { margin-top: auto; display: flex; flex-direction: column; gap: 12px; }
.side__pulse {
  border: 1px solid var(--rule);
  padding: 12px;
  background: var(--surface-2);
}
.side__pulse__label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
.side__pulse__value { font-family: var(--font-serif); font-size: 22px; letter-spacing: -.02em; margin-top: 4px; }
.side__pulse__sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

.bottom-nav { display: none; }

/* ——— Topbar ——— */
.top {
  position: sticky; top: 0; z-index: 5;
  display: flex; align-items: center; gap: 14px;
  padding: 12px 28px;
  border-bottom: 1px solid var(--rule);
  background: var(--bg);
}
.top__crumbs { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); }
.top__crumbs strong { color: var(--ink); font-weight: 500; }
.top__spacer { flex: 1; }
.top__pulse { display: flex; gap: 18px; align-items: center; }
.top__pulse__item { display: flex; align-items: baseline; gap: 6px; }
.top__pulse__item .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; }
.top__pulse__item .val { font-family: var(--font-mono); font-size: 12.5px; color: var(--ink); }

.top__campus {
  font-family: var(--font-ui);
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--rule);
  padding: 6px 10px;
  font-size: 12.5px;
  outline: none;
}

.icon-btn {
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--ink-2);
  width: 30px; height: 30px;
  display: grid; place-items: center;
  cursor: pointer;
}
.icon-btn:hover { color: var(--ink); background: var(--bg-2); }

/* ——— Main ——— */
.main { min-width: 0; display: flex; flex-direction: column; overflow-x: hidden; }
.view { padding: 28px 28px 64px; width: 100%; box-sizing: border-box; display: flex; flex-direction: column; gap: 22px; }

.view__header { display: flex; align-items: flex-end; gap: 20px; justify-content: space-between; border-bottom: 1px solid var(--rule); padding-bottom: 20px; }
.view__title { font-family: var(--font-serif); font-weight: 500; font-size: 34px; letter-spacing: -0.02em; margin: 4px 0 6px; line-height: 1.1; }
.view__lede { color: var(--ink-3); max-width: 56ch; margin: 0; }
.view__actions { display: flex; gap: 8px; align-items: center; }

/* ——— Buttons ——— */
.btn {
  font-family: var(--font-ui);
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--rule);
  padding: 7px 12px;
  font-size: 12.5px;
  cursor: pointer;
  transition: background .12s ease, border-color .12s ease, color .12s ease;
}
.btn:hover { background: var(--bg-2); border-color: var(--ink-3); }
.btn--primary { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.btn--primary:hover { background: var(--accent); border-color: var(--accent); color: var(--bg); }
.btn--sm { padding: 4px 9px; font-size: 11.5px; }

.link {
  background: none; border: 0; padding: 0;
  color: var(--ink-2); font-family: inherit; font-size: 12.5px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
}
.link:hover { color: var(--accent); }

/* ——— Cards / stats ——— */
.cards { display: grid; gap: 1px; background: var(--rule); border: 1px solid var(--rule); }
.cards--4 { grid-template-columns: repeat(4, 1fr); }
.cards--2 { grid-template-columns: repeat(2, 1fr); }
.stat { padding: 18px 20px; background: var(--surface); display: flex; flex-direction: column; gap: 6px; min-height: 104px; }
.stat__label { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
.stat__value { font-family: var(--font-serif); font-size: 28px; letter-spacing: -.02em; color: var(--ink); }
.stat__value--ok   { color: var(--ok); }
.stat__value--warn { color: var(--warn); }
.stat__value--bad  { color: var(--bad); }
.stat__sub { font-size: 12px; color: var(--muted); }
.stat__trend { margin-top: auto; color: var(--ink-3); }

/* ——— Panels ——— */
.panel { background: var(--surface); border: 1px solid var(--rule); }
.panel--flush { padding: 0; }
.panel--pad { padding: var(--panel-pad); }
.panel__header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--rule-2);
}
.panel__header--sub { padding-top: 18px; }
.panel__title { font-family: var(--font-serif); font-size: 18px; font-weight: 500; margin: 0; letter-spacing: -0.01em; }
.panel__subtitle { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin: 0; }

/* ——— Tables ——— */
.tbl-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.table-scroll {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.table-scroll .tbl { min-width: 720px; }
.table-scroll .tbl--data { min-width: 980px; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th {
  text-align: left;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 16px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--rule);
  font-weight: 500;
}
.tbl td { padding: var(--row-pad); border-bottom: 1px solid var(--rule-2); vertical-align: middle; }
.tbl tbody tr:last-child td { border-bottom: 0; }
.tbl .num { text-align: right; }
.tbl th.num { text-align: right; }
.tbl__row--click { cursor: pointer; }
.tbl__row--click:hover { background: var(--bg-2); }
.tbl__chev { color: var(--muted); width: 24px; text-align: right; }
.tbl__row--click:hover .tbl__chev { color: var(--accent); }
.cell-primary { font-weight: 500; color: var(--ink); }
.cell-mono { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }

.tbl--data td { padding: 12px 16px; }
.tbl-footer { padding: 12px 20px; font-size: 12px; border-top: 1px solid var(--rule-2); }

/* ——— Status chips ——— */
.dot { display: inline-block; border-radius: 0; }
.dot--ok   { background: var(--ok); }
.dot--warn { background: var(--warn); }
.dot--bad  { background: var(--bad); }
.dot--mute { background: var(--mute); }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10.5px;
  padding: 3px 8px;
  border: 1px solid var(--rule);
  background: transparent;
  font-family: var(--font-mono);
  letter-spacing: .06em;
  text-transform: uppercase;
  margin-right: 4px;
}
.chip--ok   { color: var(--ok);   border-color: color-mix(in oklch, var(--ok) 36%, var(--rule)); }
.chip--warn { color: var(--warn); border-color: color-mix(in oklch, var(--warn) 36%, var(--rule)); }
.chip--bad  { color: var(--bad);  border-color: color-mix(in oklch, var(--bad) 36%, var(--rule)); }
.chip--mute { color: var(--mute); }

/* Monochrome status mode */
.mono-status .chip { background: transparent; border-color: var(--rule); color: var(--ink-2); }
.mono-status .dot--ok, .mono-status .dot--warn, .mono-status .dot--bad, .mono-status .dot--mute { background: currentColor; }

/* ——— Search ——— */
.search {
  display: flex; align-items: center; gap: 8px;
  border: 1px solid var(--rule);
  padding: 6px 10px;
  background: var(--surface);
  min-width: 220px;
  color: var(--muted);
}
.search input {
  border: 0; outline: 0; background: transparent;
  font-family: inherit; font-size: 12.5px;
  color: var(--ink);
  flex: 1;
}
.search__clear {
  background: none; border: 0; cursor: pointer; color: var(--muted); font-size: 16px; line-height: 1;
}
.sort-select {
  font-family: var(--font-ui);
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--rule);
  padding: 6px 10px;
  font-size: 12.5px;
  outline: none;
  min-width: 170px;
}

/* ——— Segmented ——— */
.seg {
  display: inline-flex;
  border: 1px solid var(--rule);
  background: var(--surface);
}
.seg__btn {
  background: transparent;
  border: 0;
  border-right: 1px solid var(--rule-2);
  padding: 6px 12px;
  font-family: inherit;
  font-size: 12.5px;
  color: var(--ink-2);
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
}
.seg__btn:last-child { border-right: 0; }
.seg__btn:hover { background: var(--bg-2); color: var(--ink); }
.seg__btn.is-active { background: var(--ink); color: var(--bg); }
.seg__count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: inherit;
  opacity: .65;
}

/* ——— Split layouts ——— */
.split { display: grid; grid-template-columns: 1.35fr 1fr; gap: 20px; }
@media (max-width: 1100px) { .split { grid-template-columns: 1fr; } }

/* ——— Mix bar ——— */
.mix { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.mix__bar { display: flex; height: 10px; overflow: hidden; border: 1px solid var(--rule-2); }
.mix__seg { display: block; }
.mix__seg--ok   { background: var(--ok); }
.mix__seg--warn { background: var(--warn); }
.mix__seg--bad  { background: var(--bad); }
.mix__seg--mute { background: var(--mute); }
.mix__legend { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 6px 20px; }
.mix__legend li { display: flex; align-items: center; gap: 8px; font-size: 12.5px; }
.mix__legend li span:last-child { margin-left: auto; color: var(--ink); }

.minibars { padding: 12px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
.minibar__row { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 4px; }
.minibar__track { height: 4px; background: var(--rule-2); position: relative; }
.minibar__fill { position: absolute; top: 0; left: 0; height: 100%; }
.minibar__fill--ok   { background: var(--ok); }
.minibar__fill--warn { background: var(--warn); }
.minibar__fill--bad  { background: var(--bad); }

/* ——— Campus grid ——— */
.campus-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1px; background: var(--rule); border-top: 1px solid var(--rule); }
.campus-card { padding: 18px 20px; background: var(--surface); display: flex; flex-direction: column; gap: 14px; }
.campus-card__head { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
.campus-card__name { font-family: var(--font-serif); font-size: 17px; letter-spacing: -0.01em; }
.campus-card__count { font-family: var(--font-serif); font-size: 28px; letter-spacing: -0.02em; line-height: 1; color: var(--ink); text-align: right; }
.campus-card__count span { display: block; font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-top: 4px; }
.campus-card__stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 0; padding: 0; }
.campus-card__stats > div { display: flex; flex-direction: column; gap: 2px; }
.campus-card__stats dt { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; }
.campus-card__stats dd { margin: 0; font-family: var(--font-serif); font-size: 18px; letter-spacing: -.02em; }
.campus-card__stats dd.warn { color: var(--warn); }

.campus-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 14px 0; }
.dish-mini { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px 16px; padding-top: 14px; border-top: 1px solid var(--rule-2); }
.dish-mini__item { display: flex; align-items: center; gap: 8px; font-size: 12px; }

/* ——— Storage/battery bars ——— */
.sbar { display: inline-flex; align-items: center; gap: 10px; justify-content: flex-end; min-width: 100px; }
.sbar__track { width: 56px; height: 4px; background: var(--rule-2); position: relative; }
.sbar__fill { position: absolute; inset: 0; }
.sbar__fill--ok   { background: var(--ok); }
.sbar__fill--warn { background: var(--warn); }
.sbar__fill--bad  { background: var(--bad); }
.sbar-stack { display: inline-flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.weather-cell { max-width: 280px; line-height: 1.35; text-align: left; }
.weather-cell__title { font-weight: 500; color: var(--ink); }
.weather-cell--high .weather-cell__title { color: var(--bad); }
.weather-cell--medium .weather-cell__title { color: var(--warn); }
.drawer-callout { padding: 12px 14px; border: 1px solid var(--rule); background: var(--surface-2); }
.drawer-callout--high { border-color: color-mix(in oklch, var(--bad) 35%, var(--rule)); background: var(--bad-soft); }
.drawer-callout--medium { border-color: color-mix(in oklch, var(--warn) 35%, var(--rule)); background: var(--warn-soft); }
.inline-note { display:flex; justify-content:space-between; align-items:center; gap:14px; padding:10px 12px; border:1px solid var(--rule); background:var(--surface-2); color:var(--ink-2); font-size:12.5px; }
.inline-note--bad { border-color:color-mix(in oklch, var(--bad) 35%, var(--rule)); background:var(--bad-soft); color:var(--bad); }

/* ——— Alerts ——— */
.alerts { list-style: none; margin: 0; padding: 0; }
.alert {
  display: grid;
  grid-template-columns: 140px 1fr auto;
  gap: 18px;
  align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid var(--rule-2);
}
.alert:last-child { border-bottom: 0; }
.alert.is-ack { opacity: .55; }
.alert__sev { display: flex; flex-direction: column; gap: 4px; }
.sev {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  padding: 2px 7px;
  width: fit-content;
}
.sev--critical { background: var(--bad);  color: var(--bg); }
.sev--warning  { background: var(--warn); color: #1a1a1a; }
.sev--info     { background: var(--mute-soft); color: var(--ink-2); border: 1px solid var(--rule); }
.alert__msg { font-size: 13.5px; }
.alert__meta { font-size: 11.5px; margin-top: 3px; }
.alert__actions { display: flex; gap: 6px; }
.alert-chart { display: grid; grid-template-columns: repeat(auto-fit, minmax(72px, 1fr)); gap: 1px; background: var(--rule); border: 1px solid var(--rule); margin-bottom: 14px; }
.alert-chart__bar { min-height: 112px; padding: 10px; background: var(--surface); display: flex; flex-direction: column; justify-content: flex-end; gap: 8px; }
.alert-chart__stack { height: 64px; display: flex; align-items: flex-end; gap: 3px; }

.drawer {
  position: fixed; top: 0; right: 0; bottom: 0; width: 540px; max-width: 92vw;
  background: var(--bg); border-left: 1px solid var(--rule);
  padding: 24px;
  z-index: 50;
  overflow: auto;
  display: flex; flex-direction: column; gap: 18px;
  animation: slide .22s ease;
}
@keyframes slide { from { transform: translateX(12px); opacity: 0;} to { transform: none; opacity: 1;} }
@keyframes fade { from { opacity: 0;} to { opacity: 1; }}
.drawer__head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
.drawer__title { font-family: var(--font-serif); font-size: 26px; letter-spacing: -0.02em; margin: 2px 0 4px; font-weight: 500; }
.drawer__row { display: flex; gap: 10px; align-items: center; }
.drawer__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--rule); border: 1px solid var(--rule); }
.drawer__grid .stat { padding: 14px; min-height: 0; background: var(--surface); }
.drawer__grid .stat__value { font-size: 22px; }
.drawer__section { display: flex; flex-direction: column; gap: 8px; }
.drawer-list { list-style: none; margin: 0; padding: 0; border: 1px solid var(--rule); }
.drawer-list li { display: grid; grid-template-columns: 1.5fr 1fr auto; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--rule-2); align-items: center; background: var(--surface); }

.chart { background: var(--surface); border: 1px solid var(--rule); padding: 12px 14px; }
.chart svg { width: 100%; height: 64px; color: var(--accent); }
.chart__axis { display: flex; justify-content: space-between; font-size: 10px; margin-top: 6px; }
.drawer__foot { display: flex; gap: 8px; margin-top: auto; padding-top: 14px; border-top: 1px solid var(--rule); }

/* ——— Map ——— */

.layer-hud {

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

  <!-- ── Data ── -->
  <script type="text/babel">
// ── Real API layer ─────────────────────────────────────────────────────────────
// Auto-detect backend: production vs local dev.
// hostname === '' means the file was opened directly (file://) — treat as local.
const _h = window.location.hostname;
const _isLocal = _h === '' || _h === 'localhost' || _h === '127.0.0.1';
const PROD_API  = 'https://api.starfleet.icircles.rw';
const LOCAL_API = 'http://localhost:3000';
const DEFAULT_API = _isLocal ? LOCAL_API : PROD_API;

// If a stored base was for localhost but we're on a non-local domain, reset it.
let _storedBase = localStorage.getItem('sf_base') || DEFAULT_API;
if (!_isLocal && (_storedBase.includes('localhost') || _storedBase.includes('127.0.0.1'))) {
  _storedBase = PROD_API;
  localStorage.setItem('sf_base', PROD_API);
}
let _apiBase = _storedBase;
let _token   = localStorage.getItem('sf_tok')  || '';
let _ws      = null;

function isAuthed() { return !!_token; }

async function apiFetch(path, options = {}) {
  let r;
  const hasBody = options.body !== undefined && options.body !== null;
  try {
    r = await fetch(_apiBase + path, {
      ...options,
      headers: {
        Authorization: `Bearer ${_token}`,
        ...(hasBody ? { 'Content-Type': 'application/json' } : {}),
        ...(options.headers || {}),
      },
      body: hasBody && typeof options.body !== 'string'
        ? JSON.stringify(options.body)
        : options.body,
    });
  } catch (netErr) {
    // Network failure (server down, CORS preflight blocked, etc.)
    throw new Error(`Network error — cannot reach ${_apiBase}. Is the server running?`);
  }
  if (r.status === 401) {
    localStorage.removeItem('sf_tok');
    _token = '';
    // Trigger logout — use window._SF_LOGOUT if set, else force reload
    if (window._SF_LOGOUT) {
      window._SF_LOGOUT();
    } else {
      window.location.reload();
    }
    throw new Error('Session expired — please sign in again');
  }
  if (!r.ok) {
    const text = await r.text().catch(() => '');
    let detail = text;
    try {
      const body = JSON.parse(text);
      detail = body.error || body.detail || text;
    } catch {}
    throw new Error(detail || `Server error: HTTP ${r.status}`);
  }
  if (r.status === 204) return null;
  return r.json();
}

function apiPost(path, body = {}) {
  return apiFetch(path, { method: 'POST', body });
}

async function doLogin(email, pass, base) {
  _apiBase = (base || _apiBase).replace(/\/$/, '');
  const r = await fetch(`${_apiBase}/auth/login`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password: pass }),
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error || 'Login failed');
  }
  const d = await r.json();
  _token = d.token;
  localStorage.setItem('sf_tok', _token);
  localStorage.setItem('sf_base', _apiBase);
  return _token;
}

function doLogout() {
  localStorage.removeItem('sf_tok');
  _token = '';
  if (_ws) { _ws.close(); _ws = null; }
}

// ── Signal helpers ────────────────────────────────────────────────────────────
function computeScore(sig) {
  if (!sig) return null;
  const pd = sig.ping_drop_pct ?? 0, ob = sig.obstruction_pct ?? 0;
  const sn = sig.snr ?? 9.5,         la = sig.pop_latency_ms ?? 35;
  let s = 100;
  s -= Math.min(30, pd * 6);
  s -= Math.min(30, ob * 2);
  s -= Math.max(0, (9.5 - sn) * 8);
  s -= Math.max(0, (la - 35) * 0.3);
  return Math.max(0, Math.min(100, Math.round(s)));
}

function siteStatusStr(site) {
  const sig = site.signal;
  // No signal ingested in the last 2 hours → dish is offline
  if (!sig) return 'dark';
  // Good metrics → online (confidence only reflects reporter count, not signal quality)
  if (computeScore(sig) >= 60) return 'online';
  return 'degraded';
}

function timeAgoStr(iso) {
  if (!iso) return 'Never';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1)    return 'just now';
  if (m < 60)   return m + 'm ago';
  if (m < 1440) return Math.floor(m/60) + 'h ago';
  return Math.floor(m/1440) + 'd ago';
}

function storageUsedPct(freeBytes, totalBytes) {
  const free = Number(freeBytes);
  const total = Number(totalBytes);
  if (!Number.isFinite(free) || !Number.isFinite(total) || total <= 0) return null;
  return Math.max(0, Math.min(100, Math.round(((total - free) / total) * 100)));
}

function compactJoin(parts) {
  return parts.filter(Boolean).join(' · ');
}

function numberOrNull(value) {
  if (value == null || value === '') return null;
  const n = Number(value);
  return Number.isFinite(n) ? n : null;
}

function firstNumber(...values) {
  for (const value of values) {
    const n = numberOrNull(value);
    if (n != null) return n;
  }
  return null;
}

function pctOrNull(value) {
  const n = firstNumber(value);
  if (n == null) return null;
  return Math.max(0, Math.min(100, Math.round(n)));
}

function rainExplanation(rainfallMm) {
  if (rainfallMm == null) return 'No rainfall reading is available yet, so weather impact is unknown.';
  const rain = Number(rainfallMm);
  const mm = rain.toFixed(1);
  if (rain > 10) return `Heavy rain (${mm} mm in the last day) can cause packet loss, higher ping, and slower speeds. Check this before blaming the laptops.`;
  if (rain > 5) return `Moderate rain (${mm} mm in the last day) can add some latency or brief drops, especially on already weak signals.`;
  if (rain > 0) return `Light rain (${mm} mm in the last day) is usually not enough by itself to explain a major slowdown.`;
  return 'No rain was detected in the last day, so rain is unlikely to be driving this issue.';
}

function formatMbps(value) {
  const n = numberOrNull(value);
  if (n == null) return '—';
  return `${n >= 100 ? n.toFixed(0) : n.toFixed(1)} Mb`;
}

function formatDataUsage(usage) {
  if (!usage) return '—';
  const gb = firstNumber(usage.gb_total, usage.gbTotal);
  const bytes = firstNumber(usage.bytes_total, usage.bytesTotal);
  const valueGb = gb != null ? gb : bytes != null ? bytes / (1024 * 1024 * 1024) : null;
  if (valueGb == null) return '—';
  if (valueGb >= 1024) return `${(valueGb / 1024).toFixed(2)} TB`;
  return `${valueGb >= 100 ? valueGb.toFixed(0) : valueGb.toFixed(1)} GB`;
}

function formatShortDate(value) {
  if (!value) return '';
  return String(value).slice(0, 10);
}

function normalizeWeatherPredictor(site, weather) {
  const wp = site.weather_predictor || site.weatherPredictor || weather?.predictor || null;
  if (wp) return wp;
  const rainfall = firstNumber(weather?.rainfall_mm, site.rainfall_mm, site.rainfall);
  const cloud = firstNumber(weather?.cloud_cover_pct, site.cloud_cover_pct, site.cloudCover);
  if (rainfall == null && cloud == null) return null;
  const level = rainfall > 10 ? 'high' : rainfall > 5 ? 'medium' : 'low';
  const label = rainfall > 10 ? 'Rain warning (heavy)' : rainfall > 5 ? 'Rain warning (moderate)' : 'Weather looks normal';
  return {
    level,
    label,
    explanation: rainExplanation(rainfall),
    rainfall_mm: rainfall,
    cloud_cover_pct: cloud,
    based_on_date: weather?.date || site.weather_date || null,
  };
}

// ── Data mapping: real API → view-compatible shape ────────────────────────────
function mapSites(sites) {
  // Each Site IS a campus (one dish per campus)
  const CAMPUSES = sites.map(s => ({
    id:       s.id,
    name:     s.name,
    region:   s.location || 'Rwanda',

    lat:      s.lat,
    lng:      s.lng,
  }));

  const DISHES = sites.map(s => {
    const sig = s.signal;
    const st  = siteStatusStr(s);
    const weather = s.weather || null;
    const weatherPredictor = normalizeWeatherPredictor(s, weather);
    const starlinkUsageDaily = s.starlink_usage_daily || s.starlinkUsageDaily || null;
    const starlinkUsageBytes = firstNumber(starlinkUsageDaily?.bytes_total, starlinkUsageDaily?.bytesTotal);
    const starlinkUsageGb = firstNumber(starlinkUsageDaily?.gb_total, starlinkUsageDaily?.gbTotal);
    return {
      _siteId:      s.id,
      id:           s.starlink_sn || `DISH-${s.id}`,
      name:         s.name,
      campus:       s.id,      // integer — matches CAMPUSES[].id
      sku:          'Starlink',
      installed:    null,
      status:       st === 'dark' ? 'offline' : st,
      latency:      sig?.pop_latency_ms ?? 0,
      snr:          sig?.snr          ?? 0,
      obstruction:  sig?.obstruction_pct ?? 0,
      down:         firstNumber(s.download_mbps, sig?.download_mbps),
      up:           firstNumber(s.upload_mbps, sig?.upload_mbps),
      uptime:       s.uptime_pct != null ? Number(s.uptime_pct) : null,
      starlinkUsageDaily,
      starlinkUsageGb: starlinkUsageGb != null
        ? starlinkUsageGb
        : starlinkUsageBytes != null
          ? starlinkUsageBytes / (1024 * 1024 * 1024)
          : null,
      starlinkUsageDate: starlinkUsageDaily?.date || null,
      starlinkUsageConfidence: starlinkUsageDaily?.confidence || null,
      starlinkUsageSource: starlinkUsageDaily?.source || null,
      score:        s.score,
      score7d:      s.score_7day_avg,
      anomaly:      sig?.anomaly       ?? false,
      anomalyDelta: sig?.anomaly_delta ?? null,
      dataQuality:  sig?.data_quality  ?? null,
      weather,
      weatherPredictor,
      rainfall:     firstNumber(weather?.rainfall_mm, weatherPredictor?.rainfall_mm, s.rainfall_mm),
      cloudCover:   firstNumber(weather?.cloud_cover_pct, weatherPredictor?.cloud_cover_pct, s.cloud_cover_pct),
      confidence:   sig?.confidence    ?? 'low',
      onlineLaptops: firstNumber(s.online_laptops, s.onlineLaptops) ?? 0,
      totalLaptops:  firstNumber(s.total_laptops, s.totalLaptops) ?? 0,
      onlineIntuneLaptops: firstNumber(s.online_intune_laptops, s.online_intune) ?? 0,
      totalIntuneLaptops:  firstNumber(s.total_intune_laptops, s.total_intune) ?? 0,
      onlineChromebooks:   firstNumber(s.online_chromebooks, s.online_chrome) ?? 0,
      totalChromebooks:    firstNumber(s.total_chromebooks, s.total_chrome) ?? 0,
      throughputTrend: [],
      latencyTrend:    [],
    };
  });

  return { CAMPUSES, DISHES };
}

function mapDevices(devices) {
  return devices.map(d => {
    const seenAt = d.last_seen || d.intune_last_sync_at || d.agent_last_seen_at;
    return {
      id:         d.id,
      tag:        d.hostname || d.windows_sn || `DEV-${d.id}`,
      model:      d.model || d.manufacturer || 'Unknown',
      vendor:     d.manufacturer || '—',
      modelMeta:  compactJoin([d.os_version, d.manufacturer]),
      os:         compactJoin([d.os, d.os_version]) || '—',
      assignedTo: d.user_principal_name || null,
      campus:     d.site_id,
      status:     d.status === 'online' ? 'healthy'
                : d.status === 'stale'  ? 'needs-update'
                : 'offline',
      storage:    storageUsedPct(d.free_storage_bytes, d.total_storage_bytes),
      battery:    pctOrNull(d.battery_pct ?? d.battery_level ?? d.batteryPercentage ?? d.battery),
      batteryHealth: pctOrNull(d.battery_health_pct ?? d.battery_health ?? d.batteryHealth),
      lastSeen:   timeAgoStr(seenAt),
      lastSeenTs: seenAt ? new Date(seenAt).getTime() : null,
      staleMin:   d.stale_min ?? null,
      siteName:   d.site_name,
      windowsSn:  d.windows_sn,
      role:       d.role,
    };
  });
}

function buildAlerts(dishes) {
  const alerts = []; let n = 1000;
  dishes.forEach(d => {
    if (d.status === 'offline') {
      alerts.push({ id: `A-${n++}`, severity: 'critical', source: d.id, campus: d.campus,
        message: `${d.name} is offline — site unreachable`, ts: 'now', ack: false, assignee: null });
    } else if (d.status === 'degraded') {
      alerts.push({ id: `A-${n++}`, severity: 'warning', source: d.id, campus: d.campus,
        message: `${d.name} has degraded signal`, ts: 'now', ack: false, assignee: null });
    }
    if (d.anomaly) {
      const delta = d.anomalyDelta != null ? ` (−${Math.abs(d.anomalyDelta)}pt vs avg)` : '';
      alerts.push({ id: `A-${n++}`, severity: 'warning', source: d.id, campus: d.campus,
        message: `Signal anomaly at ${d.name}${delta}`, ts: 'now', ack: false, assignee: null });
    }
    if (d.dataQuality === 'low_data') {
      alerts.push({ id: `A-${n++}`, severity: 'info', source: d.id, campus: d.campus,
        message: `Low data quality at ${d.name}`, ts: 'now', ack: false, assignee: null });
    }
    const wp = d.weatherPredictor;
    if (wp && (wp.level === 'high' || wp.level === 'medium')) {
      alerts.push({ id: `A-${n++}`, severity: wp.level === 'high' ? 'warning' : 'info', source: d.id, campus: d.campus,
        message: `${wp.label} at ${d.name}: ${wp.explanation || rainExplanation(d.rainfall)}`, ts: 'now', ack: false, assignee: null });
    }
  });
  return alerts;
}

function mapBackendAlerts(alerts) {
  return (alerts || []).map(a => ({
    id: `B-${a.id}`,
    backendId: a.id,
    severity: a.severity || 'info',
    category: a.category || 'general',
    source: a.source_type || a.category || 'alert',
    campus: a.site_id,
    siteName: a.site_name,
    title: a.title,
    message: a.message || a.title || 'Alert',
    ts: timeAgoStr(a.last_seen_at || a.detected_at),
    ack: a.status !== 'open',
    status: a.status,
    assignee: a.assignee || (a.metadata && a.metadata.assignee) || null,
    metadata: a.metadata || {},
  }));
}

window._API = { apiFetch, apiPost, doLogin, doLogout, isAuthed, DEFAULT_API, getBase: () => _apiBase };
window._MAPPERS = { mapSites, mapDevices, buildAlerts, mapBackendAlerts };

// Placeholder so later scripts don't crash during initial render
window.STARFLEET_DATA = { CAMPUSES: [], DISHES: [], COMPUTERS: [], ALERTS: [] };

  <script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

function Sparkline({ points, stroke = 'currentColor', fill = 'none', height = 24, width = 88, dim = false }) {
  if (!points || !points.length) return null;
  const min = Math.min(...points), max = Math.max(...points), span = max - min || 1;
  const step = width / (points.length - 1);
  const d = points.map((p,i) => {
    const x = i * step, y = height - ((p-min)/span) * (height-4) - 2;
    return `${i===0?'M':'L'}${x.toFixed(1)} ${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg width={width} height={height} style={{display:'block', opacity: dim ? 0.4 : 1}}>
      <path d={d} stroke={stroke} strokeWidth="1.25" fill={fill} />
    </svg>
  );
}

const STATUS_LABEL = {
  online:'Online', degraded:'Degraded', offline:'Offline',
  standby:'Standby', maintenance:'Maintenance',
  healthy:'Healthy', 'needs-update':'Update due', 'low-storage':'Low storage',
  critical:'Critical', 'in-repair':'In repair',
};
const STATUS_TONE = {
  online:'ok', healthy:'ok',
  degraded:'warn', 'needs-update':'warn', 'low-storage':'warn',
  offline:'bad', critical:'bad',
  standby:'mute', maintenance:'mute', 'in-repair':'mute',
};
function StatusDot({ status, size = 6 }) {
  const tone = STATUS_TONE[status] || 'mute';
  return <span className={`dot dot--${tone}`} style={{width:size,height:size}} aria-label={status} />;
}
function StatusChip({ status }) {
  const tone = STATUS_TONE[status] || 'mute';

}

function Stat({ label, value, sub, trend, tone }) {

}

function Segmented({ options, value, onChange }) {

    </div>

}

const Icon = {
  dish:     <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><path d="M2 11 Q8 3 14 11"/><path d="M8 11v2.5"/><path d="M5.5 13.5h5"/><circle cx="8" cy="7.5" r="1"/></svg>,
  laptop:   <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><rect x="2.5" y="3" width="11" height="7.5" rx="0.5"/><path d="M1 12h14"/></svg>,
  user:     <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><circle cx="8" cy="6" r="2.5"/><path d="M3 13c1-2.5 3-3.5 5-3.5s4 1 5 3.5"/></svg>,
  bell:     <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><path d="M4 11V7a4 4 0 1 1 8 0v4l1 1H3z"/><path d="M7 13.5a1 1 0 0 0 2 0"/></svg>,
  campus:   <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><path d="M2 13V7l6-3.5L14 7v6"/><path d="M2 13h12"/><rect x="6.5" y="9" width="3" height="4"/></svg>,
  overview: <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.25"><rect x="2" y="2" width="5" height="5"/><rect x="9" y="2" width="5" height="5"/><rect x="2" y="9" width="5" height="5"/><rect x="9" y="9" width="5" height="5"/></svg>,
  sun:      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><circle cx="8" cy="8" r="3"/><path d="M8 1.5v1.5M8 13v1.5M1.5 8h1.5M13 8h1.5M3.2 3.2l1 1M11.8 11.8l1 1M3.2 12.8l1-1M11.8 4.2l1-1"/></svg>,
  moon:     <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M13 9.5A5.5 5.5 0 1 1 6.5 3a4.5 4.5 0 0 0 6.5 6.5z"/></svg>,
  close:    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.3"><path d="M3 3l10 10M13 3 3 13"/></svg>,

};

function campusName(data, id) {
  const c = data.CAMPUSES.find(x => x.id === id);
  return c ? c.name : id;
}

function usePersisted(key, initial) {
  const [v, setV] = useState(() => {
    try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : initial; } catch { return initial; }
  });
  useEffect(() => { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }, [key, v]);
  return [v, setV];
}

window._SF = { Sparkline, StatusDot, StatusChip, Stat, Segmented, Search, Icon, STATUS_LABEL, STATUS_TONE, campusName, usePersisted };

const { useState: uS, useMemo: uM } = React;

function compareSortValues(a, b, dir = 'asc') {
  const aMissing = a == null || a === '';
  const bMissing = b == null || b === '';
  if (aMissing && bMissing) return 0;
  if (aMissing) return 1;
  if (bMissing) return -1;

  let result;
  if (typeof a === 'number' && typeof b === 'number') {
    result = a - b;
  } else {
    result = String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' });
  }
  return dir === 'desc' ? -result : result;
}

function sortRows(rows, sort, accessors) {
  const [key, dir = 'asc'] = String(sort || '').split(':');
  const getter = accessors[key];
  if (!getter) return rows;
  return [...rows].sort((a, b) => compareSortValues(getter(a), getter(b), dir));
}

function SortSelect({ value, onChange, options, label = 'Sort data' }) {
  return (
    <select className="sort-select" value={value} onChange={e => onChange(e.target.value)} aria-label={label}>

function Computers({ data, filter, onPushUpdate, pushBusy, pushMessage, pushError }) {

function Alerts({ data, onAckAlert, ackBusy, onAssignAlert, assignBusy }) {
  const [only, setOnly] = uS('open');
  const rows = data.ALERTS.filter(a => only==='open'?!a.ack : only==='all'?true : a.severity===only);
  const buckets = data.ALERT_SUMMARY || [];
  const byDay = buckets.reduce((acc, b) => {
    const day = String(b.day || '').slice(5, 10) || 'now';
    acc[day] ||= { critical: 0, warning: 0, info: 0, total: 0 };
    const sev = b.severity === 'critical' || b.severity === 'warning' ? b.severity : 'info';
    acc[day][sev] += Number(b.count || 0);
    acc[day].total += Number(b.count || 0);
    return acc;
  }, {});
  const chart = Object.entries(byDay).slice(-14);
  const max = Math.max(1, ...chart.map(([, v]) => v.total));
  return (
    <div className="view">
      <div className="view__header"><div><div className="eyebrow">Triage</div><h1 className="view__title">Alerts</h1></div></div>
      {chart.length > 0 && (
        <div className="alert-chart" aria-label="Alert trend">
          {chart.map(([day, v]) => (
            <div className="alert-chart__bar" key={day}>
              <div className="alert-chart__stack">
                {['critical','warning','info'].map(sev => (
                  <span
                    key={sev}
                    className={`alert-chart__seg alert-chart__seg--${sev}`}
                    style={{height: `${Math.max(2, (v[sev] / max) * 64)}px`, opacity: v[sev] ? 1 : .18}}
                  />
                ))}
              </div>
              <div><div className="alert-chart__label">{day}</div><div className="alert-chart__count">{v.total} total</div></div>
            </div>
          ))}
        </div>
      )}
      <div className="tbl-toolbar">
        <Segmented value={only} onChange={setOnly} options={[
          {id:'open',label:'Open',count:data.ALERTS.filter(a=>!a.ack).length},
          {id:'critical',label:'Critical',count:data.ALERTS.filter(a=>a.severity==='critical').length},
          {id:'warning',label:'Warning',count:data.ALERTS.filter(a=>a.severity==='warning').length},
          {id:'info',label:'Info',count:data.ALERTS.filter(a=>a.severity==='info').length},
          {id:'all',label:'All',count:data.ALERTS.length},
        ]} />
      </div>
      <section className="panel panel--flush">
        <ul className="alerts">
          {rows.map(a => (
            <li key={a.id} className={`alert ${a.ack?'is-ack':''}`}>
              <div className="alert__sev"><span className={`sev sev--${a.severity}`}>{a.severity}</span><span className="mono muted">{a.ts}</span></div>
              <div className="alert__body">
                <div className="alert__msg">{a.message}</div>
                <div className="alert__meta mono muted">{a.source} · {campusName(data,a.campus)}{a.assignee?<> · {a.assignee}</>:null}</div>
              </div>
              <div className="alert__actions">
                {a.ack
                  ? <span className="chip chip--mute"><StatusDot status="standby"/>Acknowledged</span>
                  : <><button className="btn btn--sm" disabled={assignBusy === a.id} onClick={()=>onAssignAlert(a)}>{assignBusy === a.id ? 'Saving...' : (a.assignee ? 'Reassign' : 'Assign')}</button><button className="btn btn--sm btn--primary" disabled={ackBusy === a.id} onClick={()=>onAckAlert(a)}>{ackBusy === a.id ? 'Saving...' : 'Acknowledge'}</button></>
                }
              </div>
            </li>
          ))}
          {rows.length===0 && <li className="empty">Nothing here. Inbox zero.</li>}
        </ul>
      </section>
    </div>
  );
}

function Campuses({ data }) {

  <script type="text/babel">
const { useEffect: dUE, useState: dUS } = React;
const { StatusDot: SDot, StatusChip: SChip, Stat: StatC, Icon: Ic, campusName: cName, Sparkline: Spk } = window._SF;

function DishDetail({ dish, data, onClose }) {
  const [busyAction, setBusy] = dUS(null);
  dUE(() => {
    if (!dish) return;
    const onKey = e => { if (e.key==='Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [dish, onClose]);
  if (!dish) return null;
  const siteId = dish._siteId || dish.campus;

  async function triggerSite(type) {
    if (busyAction) return;
    if (type === 'reboot_starlink' && !confirm(`Reboot the Starlink dish at ${dish.name}? This will interrupt connectivity for ~2 minutes.`)) return;
    setBusy(type);
    try {
      const res = await window._API.apiPost('/api/trigger/site', { site_id: siteId, type });
      alert(`${triggerLabel(type)} queued for ${dish.name} on ${res.count} device${res.count === 1 ? '' : 's'}.`);
    } catch (err) {
      alert(`Failed: ${err.message || err}`);
    } finally {
      setBusy(null);
    }
  }

  return (
    <>
      <div className="scrim" onClick={onClose} />
      <aside className="drawer" role="dialog" aria-label={`Dish ${dish.name}`}>
        <header className="drawer__head">
          <div>
            <div className="eyebrow">Starlink dish</div>
            <h2 className="drawer__title">{dish.name}</h2>
            <div className="cell-mono">{dish.id} · {dish.sku}{dish.installed ? ` · installed ${dish.installed}` : ''}</div>
          </div>
          <button className="icon-btn" onClick={onClose} aria-label="Close">{Ic.close}</button>
        </header>
        <div className="drawer__row"><SChip status={dish.status} /><span className="muted">{cName(data,dish.campus)}</span></div>
        <div className="drawer__grid">
          <StatC label="Download" value={formatMbps(dish.down)} />
          <StatC label="Upload"   value={formatMbps(dish.up)} />
          <StatC label="Latency"  value={dish.latency?dish.latency+'ms':'—'} tone={dish.latency>80?'warn':null} />
          <StatC label="SNR"      value={dish.snr?dish.snr.toFixed(1):'—'} />
          <StatC label="Obstruct." value={dish.obstruction.toFixed(1)+'%'} tone={dish.obstruction>5?'warn':null} />
          <StatC label="Uptime" value={dish.uptime != null ? dish.uptime.toFixed(2)+'%' : '—'} />
          <StatC
            label="Portal usage"
            value={formatDataUsage(dish.starlinkUsageDaily)}
            sub={compactJoin([
              formatShortDate(dish.starlinkUsageDate),
              dish.starlinkUsageConfidence === 'derived_from_snapshot' ? 'daily delta' : null,
              dish.starlinkUsageConfidence === 'cycle_reset_estimate' ? 'cycle reset' : null,
            ])}
          />
          <StatC label="Connected" value={`${dish.onlineLaptops ?? 0}/${dish.totalLaptops ?? 0}`} />
          <StatC label="Intune laptops" value={`${dish.onlineIntuneLaptops ?? 0}/${dish.totalIntuneLaptops ?? 0}`} />
          <StatC label="Chromebooks" value={`${dish.onlineChromebooks ?? 0}/${dish.totalChromebooks ?? 0}`} />
        </div>
        {dish.weatherPredictor && (
          <section className="drawer__section">
            <h4 className="panel__subtitle">Weather predictor</h4>
            <div className={`drawer-callout drawer-callout--${dish.weatherPredictor.level}`}>
              <div className="weather-cell__title">{dish.weatherPredictor.label}</div>
              <div className="cell-mono">
                {dish.rainfall == null ? 'rain unknown' : `${Number(dish.rainfall).toFixed(1)} mm rain`}
                {dish.cloudCover != null ? ` · ${Math.round(Number(dish.cloudCover))}% cloud` : ''}
              </div>
              <div className="muted">{dish.weatherPredictor.explanation || rainExplanation(dish.rainfall)}</div>
            </div>
          </section>
        )}
        <section className="drawer__section">
          <h4 className="panel__subtitle">Throughput · last 24h</h4>
          <div className="chart">
            <Spk points={dish.throughputTrend} height={64} width={480} dim={dish.status!=='online'} />
            <div className="chart__axis mono muted"><span>−24h</span><span>−12h</span><span>now</span></div>
          </div>
        </section>
        <section className="drawer__section">
          <h4 className="panel__subtitle">Latency · last 24h</h4>
          <div className="chart">
            <Spk points={dish.latencyTrend} height={64} width={480} dim={dish.status!=='online'} />
            <div className="chart__axis mono muted"><span>−24h</span><span>−12h</span><span>now</span></div>
          </div>
        </section>
        <section className="drawer__section">
          <h4 className="panel__subtitle">Remediation actions</h4>
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
            <button className="btn" onClick={()=>triggerSite('diagnostics')} disabled={!!busyAction}>
              {busyAction==='diagnostics' ? 'Queuing…' : 'Diagnostics'}
            </button>
            <button className="btn" onClick={()=>triggerSite('ping_dish')} disabled={!!busyAction}>
              {busyAction==='ping_dish' ? 'Queuing…' : 'Ping dish'}
            </button>
            <button className="btn" onClick={()=>triggerSite('data_pull')} disabled={!!busyAction}>
              {busyAction==='data_pull' ? 'Queuing…' : 'Pull data'}
            </button>
            <button className="btn" onClick={()=>triggerSite('location_refresh')} disabled={!!busyAction}>
              {busyAction==='location_refresh' ? 'Queuing…' : 'Location'}
            </button>
            <button className="btn" onClick={()=>triggerSite('reboot_starlink')} disabled={!!busyAction}>
              {busyAction==='reboot_starlink' ? 'Queuing…' : 'Reboot dish'}
            </button>
          </div>
        </section>
        <footer className="drawer__foot">
          <button className="btn" onClick={onClose}>Close</button>
          <button className="btn btn--primary" onClick={()=>window.open('https://www.starlink.com/account/home','_blank','noopener')}>Open in Starlink</button>
        </footer>
      </aside>
    </>
  );
}
function triggerLabel(type) {
  const labels = { diagnostics:'Diagnostics', ping_dish:'Dish ping', data_pull:'Data pull', location_refresh:'Location refresh', reboot_starlink:'Starlink reboot' };
  return labels[type] || type;
}
window._DishDetail = DishDetail;
  </script>

function project(lat, lng) {
  if (lat == null || lng == null) return { x: -999, y: -999 };
  const x = ((lng - RW_BOUNDS.minLng) / (RW_BOUNDS.maxLng - RW_BOUNDS.minLng)) * 1000;
  const y = ((RW_BOUNDS.maxLat - lat)  / (RW_BOUNDS.maxLat - RW_BOUNDS.minLat)) * 800;
  return { x: Math.round(x), y: Math.round(y) };
}

function campusHealth(data, campusId) {
  const dishes   = data.DISHES.filter(d => d.campus === campusId);
  const offline  = dishes.filter(d => d.status === 'offline').length;
  const degraded = dishes.filter(d => d.status === 'degraded').length;
  const pcs      = data.COMPUTERS.filter(c => c.campus === campusId);
  let tone = 'ok';
  if (offline > 0) tone = 'bad';
  else if (degraded > 0) tone = 'warn';
  return {
    tone, offline, degraded,
    dishes: dishes.length, onlineDishes: dishes.length - offline - degraded,
    pcs: pcs.length,
  };
}

function PinTooltip({ p, flip }) {
  // flip: show label to the left when pin is near right edge
  const W = p.name.length * 7 + 20, H = 34;
  const ox = flip ? -(W + 12) : 14;
  const oy = -H / 2;
  const tc = p.health.tone === 'ok' ? 'var(--ok)' : p.health.tone === 'warn' ? 'var(--warn)' : 'var(--bad)';
  return (
    <g transform={`translate(${p.x + ox} ${p.y + oy})`} style={{ pointerEvents: 'none' }}>
      <rect width={W} height={H} rx="0" fill="var(--surface)" stroke={tc} strokeWidth="1.5" />
      <text x="10" y="14" fontSize="12" fill="var(--ink)" fontFamily="var(--font-ui)" fontWeight="600">{p.name}</text>
      <text x="10" y="27" fontSize="10" fill="var(--muted)" fontFamily="var(--font-mono)" letterSpacing="0.05em">
        {p.health.onlineDishes}/{p.health.dishes} DISHES · {p.health.pcs} PCS
      </text>
    </g>
  );
}

const RWANDA_CENTER = [29.87, -1.94];
const TILE_STYLE = 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json';
const DARK_TILE_STYLE = 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json';

function pinColor(tone) {
  if (tone === 'ok') return '#3e7d4a';
  if (tone === 'warn') return '#b7791f';
  return '#b13c3c';
}

function MapStage({ pins, selected, onSelect, flyToId, satellites }) {
  const containerRef = mUR(null);
  const mapRef = mUR(null);
  const markersRef = mUR([]);
  const satMarkersRef = mUR([]);
  const popupRef = mUR(null);
  const prevFlyRef = mUR(null);

  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

  mUE(() => {
    if (!containerRef.current || mapRef.current) return;

    const map = new maplibregl.Map({
      container: containerRef.current,
      style: isDark ? DARK_TILE_STYLE : TILE_STYLE,
      center: RWANDA_CENTER,
      zoom: 8,
      maxBounds: [[28.36, -3.34], [31.40, -0.55]],
      attributionControl: false,
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'top-right');
    map.addControl(new maplibregl.ScaleControl({ maxWidth: 120 }), 'bottom-left');

    mapRef.current = map;

    return () => { map.remove(); mapRef.current = null; };
  }, []);

  mUE(() => {
    const map = mapRef.current;
    if (!map || !flyToId || flyToId === prevFlyRef.current) return;
    prevFlyRef.current = flyToId;
    const pin = pins.find(p => p.id === selected);
    if (pin && pin.lat != null && pin.lng != null) {
      map.flyTo({ center: [pin.lng, pin.lat], zoom: 11, duration: 800 });
    }
  }, [flyToId, selected, pins]);

  mUE(() => {
    const map = mapRef.current;
    if (!map) return;

    markersRef.current.forEach(m => m.remove());
    markersRef.current = [];
    if (popupRef.current) { popupRef.current.remove(); popupRef.current = null; }

    pins.forEach(p => {
      if (p.lat == null || p.lng == null) return;
      const color = pinColor(p.health.tone);
      const isSel = p.id === selected;
      const size = isSel ? 14 : 10;

      const el = document.createElement('div');
      el.style.cssText = `
        width: ${size + 6}px; height: ${size + 6}px; border-radius: 0;
        background: white; border: 2px solid ${color};
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: transform 0.15s;
        
      `;
      if (isSel) el.style.transform = 'scale(1.2)';

      const inner = document.createElement('div');
      inner.style.cssText = `
        width: ${size - 4}px; height: ${size - 4}px;
        border-radius: 0; background: ${color};
      `;
      el.appendChild(inner);

      el.addEventListener('click', (e) => { e.stopPropagation(); onSelect(p.id); });

      el.addEventListener('mouseenter', () => {
        const popup = new maplibregl.Popup({
          closeButton: false, closeOnClick: false, offset: 12,
          className: 'starfleet-popup',
        })
          .setLngLat([p.lng, p.lat])
          .setHTML(`
            <div style="font-family: var(--font-ui); font-size: 12px;">
              <strong>${p.name}</strong><br/>
              <span style="color: #888;">${p.health.onlineDishes}/${p.health.dishes} dishes · ${p.health.pcs} PCs</span>
            </div>
          `)
          .addTo(map);
        popupRef.current = popup;
      });

      el.addEventListener('mouseleave', () => {
        if (popupRef.current) { popupRef.current.remove(); popupRef.current = null; }
      });

      const marker = new maplibregl.Marker({ element: el })
        .setLngLat([p.lng, p.lat])
        .addTo(map);
      markersRef.current.push(marker);
    });
  }, [pins, selected]);

  // Satellite overlay
  mUE(() => {
    const map = mapRef.current;
    if (!map) return;

    satMarkersRef.current.forEach(m => m.remove());
    satMarkersRef.current = [];

    if (!satellites || !satellites.length) return;

    satellites.forEach(sat => {
      const el = document.createElement('div');
      el.style.cssText = `
        width: 6px; height: 6px; border-radius: 0;
        background: var(--accent); opacity: 0.7;
        
        pointer-events: auto; cursor: default;
      `;

      el.addEventListener('mouseenter', () => {
        const popup = new maplibregl.Popup({
          closeButton: false, closeOnClick: false, offset: 8,
          className: 'starfleet-popup',
        })
          .setLngLat([sat.lng, sat.lat])
          .setHTML(`
            <div style="font-family: var(--font-ui); font-size: 11px;">
              <strong>${sat.name}</strong><br/>
              <span style="color: #888;">Alt ${sat.alt_km} km · El ${sat.elevation_deg}°</span>
            </div>
          `)
          .addTo(map);
        popupRef.current = popup;
      });
      el.addEventListener('mouseleave', () => {
        if (popupRef.current) { popupRef.current.remove(); popupRef.current = null; }
      });

      const marker = new maplibregl.Marker({ element: el })
        .setLngLat([sat.lng, sat.lat])
        .addTo(map);
      satMarkersRef.current.push(marker);
    });
  }, [satellites]);

  return React.createElement('div', {
    className: 'map-stage',
    ref: containerRef,
  });
}

const { useState: aUS, useEffect: aUE } = React;
const { Icon: AppIcon, usePersisted } = window._SF;
const { Overview, Starlinks, Computers, Alerts, Campuses } = window._VIEWS;

function App() {
  const [authed, setAuthed] = aUS(window._API.isAuthed());
  const [sites,   setSites]   = aUS([]);
  const [devices, setDevices] = aUS([]);
  const [loading, setLoading] = aUS(false);
  const [loadErr, setLoadErr] = aUS(null);
  const [pushBusy, setPushBusy] = aUS(false);
  const [pushMessage, setPushMessage] = aUS(null);
  const [pushError, setPushError] = aUS(null);
  const [tweaks, setTweaks] = usePersisted('starfleet.tweaks', TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = aUS(false);
  const [tab, setTab] = usePersisted('starfleet.tab', tweaks.landingTab || 'overview');
  const [campus, setCampus] = aUS('all');
  const [dish, setDish] = aUS(null);
  const [alertRows, setAlertRows] = aUS([]);
  const [alertSummary, setAlertSummary] = aUS([]);
  const [alertAckBusy, setAlertAckBusy] = aUS(null);
  const [alertAssignBusy, setAlertAssignBusy] = aUS(null);

  const [kpData, setKpData] = aUS(null);
  const [isAdmin] = aUS(() => {
    try {
      const tok = localStorage.getItem('sf_tok');
      if (!tok) return false;
      const payload = JSON.parse(atob(tok.split('.')[1]));
      return payload.role === 'admin';
    } catch { return false; }
  });

  // Expose logout handler — must be set before loadAll fires
  window._SF_LOGOUT = () => { setAuthed(false); setSites([]); setDevices([]); setLoadErr(null); };
  aUE(() => {
    return () => { window._SF_LOGOUT = null; };
  }, []);

  // Load data from real API
  const loadAll = async () => {
    setLoading(true);
    setLoadErr(null);
    try {
      const [s, d, kp, alerts, summary] = await Promise.all([
        window._API.apiFetch('/api/sites'),
        window._API.apiFetch('/api/devices').catch(() => []),
        window._API.apiFetch('/api/intel/space-weather').catch(() => []),
        window._API.apiFetch('/api/alerts?status=all&limit=200').catch(() => []),
        window._API.apiFetch('/api/alerts/summary?days=14').catch(() => []),
      ]);
      setSites(s);
      setDevices(d);
      setAlertRows(window._MAPPERS.mapBackendAlerts(alerts));
      setAlertSummary(summary || []);
      if (kp && kp.length > 0) setKpData(kp[0]);
    } catch (e) {
      console.error('[Starfleet]', e.message);
      // Don't overwrite error on session expiry (logout already triggered)
      if (!e.message.includes('Session expired')) setLoadErr(e.message);
    } finally {
      setLoading(false);
    }
  };

  const pushLaptopUpdate = async (targetCampus = 'all') => {
    setPushBusy(true);
    setPushMessage(null);
    setPushError(null);
    try {
      const syncResult = await window._API.apiPost('/api/intune/sync', {});
      const allCampuses = targetCampus === 'all';
      try {
        const result = allCampuses
          ? await window._API.apiPost('/api/trigger/devices', { type: 'data_pull' })
          : await window._API.apiPost('/api/trigger/site', { site_id: Number(targetCampus), type: 'data_pull' });
        const noun = result.count === 1 ? 'laptop' : 'laptops';
        setPushMessage(`Synced ${syncResult.upserted} Intune devices and queued data refresh for ${result.count} Intune-managed ${noun}.`);
      } catch (triggerErr) {
        setPushError(`Synced ${syncResult.upserted} Intune devices, but device push failed: ${triggerErr.message || triggerErr}`);
      }
      await loadAll();
    } catch (e) {
      setPushError(e.message || 'Push update failed');
    } finally {
      setPushBusy(false);
    }
  };

  const runFleetDiagnostics = async () => {
    if (!confirm('Run diagnostics on all Intune-managed devices across the fleet?')) return;
    try {
      const res = await window._API.apiPost('/api/trigger/devices', { type: 'diagnostics' });
      alert(`Diagnostics queued for ${res.count} device${res.count === 1 ? '' : 's'}.`);
    } catch (e) {
      alert(`Diagnostics failed: ${e.message || e}`);
    }
  };

  const acknowledgeAlert = async (alertRow) => {
    if (!alertRow.backendId || alertAckBusy) return;
    setAlertAckBusy(alertRow.id);
    try {
      await window._API.apiPost(`/api/alerts/${alertRow.backendId}/ack`, {});
      setAlertRows(prev => prev.map(a => a.id === alertRow.id ? {...a, ack: true, status: 'acknowledged'} : a));
      window._API.apiFetch('/api/alerts/summary?days=14').then(setAlertSummary).catch(() => {});
    } catch (e) {
      alert(`Acknowledge failed: ${e.message || e}`);
    } finally {
      setAlertAckBusy(null);
    }
  };

  const assignAlert = async (alertRow) => {
    if (!alertRow.backendId || alertAssignBusy) return;
    const input = window.prompt('Assign this alert to (clear to unassign):', alertRow.assignee || '');
    if (input === null) return; // cancelled
    const assignee = input.trim() || null;
    setAlertAssignBusy(alertRow.id);
    try {
      await window._API.apiPost(`/api/alerts/${alertRow.backendId}/assign`, { assignee });
      setAlertRows(prev => prev.map(a => a.id === alertRow.id
        ? { ...a, assignee, metadata: { ...(a.metadata || {}), assignee: assignee || undefined } }
        : a));
    } catch (e) {
      alert(`Assign failed: ${e.message || e}`);
    } finally {
      setAlertAssignBusy(null);
    }
  };

  // Boot: load + WebSocket (fallback poll only when WS is down)
  aUE(() => {
    if (!authed) return;
    loadAll();
    let wsAlive = false;
    let pollTimer = null;

    const startFallbackPoll = () => {
      if (!pollTimer) pollTimer = setInterval(loadAll, 120_000);
    };
    const stopFallbackPoll = () => {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    };

    try {
      const wsUrl = window._API.getBase().replace(/^http/, 'ws') + '?token=' + encodeURIComponent(localStorage.getItem('sf_tok') || '');
      const ws = new WebSocket(wsUrl);
      ws.onopen = () => {
        wsAlive = true;
        stopFallbackPoll();
        ws.send(JSON.stringify({ type: 'auth', token: localStorage.getItem('sf_tok') || '' }));
      };
      ws.onmessage = e => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'signal_update') {
            setSites(prev => prev.map(s => s.id === msg.site_id ? { ...s, signal: { ...s.signal, ...msg.signal } } : s));
          }
          if (msg.type === 'device_online') {
            window._API.apiFetch('/api/devices').then(setDevices).catch(() => {});
          }
          if (msg.type === 'stale_devices') {
            const staleIds = new Set(msg.devices.map(d => d.device_id));
            const staleMins = new Map(msg.devices.map(d => [d.device_id, d.stale_min]));
            setDevices(prev => prev.map(d => staleIds.has(d.id)
              ? { ...d, status: 'stale', stale_min: staleMins.get(d.id) ?? null }
              : d));
          }
        } catch { /* ignore malformed frames */ }
      };
      ws.onclose = () => { wsAlive = false; startFallbackPoll(); };
      ws.onerror = () => {};
    } catch { startFallbackPoll(); }

    return () => stopFallbackPoll();
  }, [authed]);

  // Theme / accent / type
  aUE(() => {
    const root = document.documentElement;
    root.setAttribute('data-theme', tweaks.theme==='dark'?'dark':'light');
    const a = ACCENTS[tweaks.accent] || ACCENTS.signal;
    root.style.setProperty('--accent',      tweaks.theme==='dark'?a.dark:a.light);
    root.style.setProperty('--accent-soft', tweaks.theme==='dark'?a.soft_d:a.soft_l);
    root.style.setProperty('--accent-ink',  tweaks.theme==='dark'?a.ink_d:a.ink_l);
    const t = TYPE_PAIRINGS[tweaks.typePairing] || TYPE_PAIRINGS['serif-sans'];
    root.style.setProperty('--font-serif', t.serif);
    root.style.setProperty('--font-ui', t.ui);
    document.body.style.fontFamily = t.ui;
  }, [tweaks.theme, tweaks.accent, tweaks.typePairing]);

  const patch = upd => setTweaks(prev => ({...prev,...upd}));

  // Keyboard shortcuts
  aUE(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      const k = e.key.toLowerCase();
      const shortcuts = {
        o: 'overview', s: 'starlinks', c: 'computers',
        a: 'alerts', p: 'campuses', m: 'map',
      };
      if (shortcuts[k]) { e.preventDefault(); setTab(shortcuts[k]); return; }
      if (k === 'escape') { setDish(null); setTweaksOpen(false); return; }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  if (!authed) return <LoginScreen onLogin={() => { setAuthed(true); }} />;

  // Map real API data to view-compatible shape
  const { CAMPUSES, DISHES } = window._MAPPERS.mapSites(sites);
  const COMPUTERS = window._MAPPERS.mapDevices(devices);

  const ALERTS = alertRows.length ? alertRows : window._MAPPERS.buildAlerts(DISHES);

  const liveData = { CAMPUSES, DISHES, COMPUTERS, ALERTS, ALERT_SUMMARY: alertSummary };

  const onlineDishes = DISHES.filter(d=>d.status==='online').length;
  const upDishes = DISHES.filter(d=>d.uptime != null);
  const fleetUptime = upDishes.length
    ? (upDishes.reduce((s,d)=>s+d.uptime,0)/upDishes.length).toFixed(2)
    : '—';
  const openAlertCount = ALERTS.filter(a=>!a.ack).length;
  const criticalCount  = ALERTS.filter(a=>!a.ack&&a.severity==='critical').length;

  const appClass = [
    'app',
    tweaks.sidebar==='tight'?'is-tight':'',
    tweaks.density==='cozy'?'density-cozy':tweaks.density==='dense'?'density-dense':'',
    tweaks.monochromeStatus?'mono-status':'',
  ].filter(Boolean).join(' ');

  return (
    <div className={appClass}>
      <aside className="side">
        <div className="side__head">
          <div className="side__logo" aria-hidden>S</div>
          <div className="side__head__name">Starfleet<small>Isomo Ops</small></div>
        </div>
        <div>
          <div className="side__section-label side__label">Operations</div>
          <nav className="nav">
            <NavItem icon={AppIcon.overview} label="Overview"  active={tab==='overview'}  onClick={()=>setTab('overview')} />
            <NavItem icon={AppIcon.dish}     label="Starlinks" active={tab==='starlinks'} onClick={()=>setTab('starlinks')} count={`${onlineDishes}/${liveData.DISHES.length}`} />
            <NavItem icon={AppIcon.laptop}   label="Computers" active={tab==='computers'} onClick={()=>setTab('computers')} count={liveData.COMPUTERS.length} />
            <NavItem icon={AppIcon.bell}     label="Alerts"    active={tab==='alerts'}    onClick={()=>setTab('alerts')}    count={openAlertCount||'—'} />
            <NavItem icon={AppIcon.campus}   label="Campuses"  active={tab==='campuses'}  onClick={()=>setTab('campuses')} />
            <NavItem icon={AppIcon.map}      label="Map"       active={tab==='map'}       onClick={()=>setTab('map')} />
          </nav>
        </div>
        <div className="side__foot">
          <div className="side__pulse">
            <div className="side__pulse__label">Fleet uptime</div>
            <div className="side__pulse__value">{fleetUptime}{fleetUptime!=='—' && <span style={{fontSize:14,color:'var(--muted)'}}>%</span>}</div>
            <div className="side__pulse__sub">{onlineDishes}/{liveData.DISHES.length} dishes online</div>
          </div>
        </div>
      </aside>

      <main className="main">
        <header className="top">
          <div className="top__crumbs">
            <strong>Isomo Academy</strong><span>/</span>
            <span>{tab[0].toUpperCase()+tab.slice(1)}</span>
          </div>
          <div className="top__spacer" />
          {tweaks.showTopPulse && (
            <div className="top__pulse">
              <div className="top__pulse__item">
                <span className="lbl">Status</span>
                <span className="val">{criticalCount ? criticalCount + ' critical' : 'All systems normal'}</span>
              </div>
              {kpData && (
                <div className="top__pulse__item">
                  <span className="lbl">Kp</span>
                  <span className="val" style={{ color: kpData.k_index >= 5 ? 'var(--bad)' : kpData.k_index >= 4 ? 'var(--warn)' : 'var(--ok)' }}>
                    {kpData.k_index}{kpData.k_index >= 5 ? ' storm' : ''}
                  </span>
                </div>
              )}
              <div className="top__pulse__item"><span className="lbl">Now</span><span className="val">Kigali CAT</span></div>
            </div>
          )}
          <select className="top__campus" value={campus} onChange={e=>setCampus(e.target.value)} aria-label="Filter by campus">
            <option value="all">All campuses</option>
            {liveData.CAMPUSES.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
          <button className="icon-btn" onClick={()=>patch({theme:tweaks.theme==='dark'?'light':'dark'})} aria-label="Toggle theme" title="Toggle theme">
            {tweaks.theme==='dark'?AppIcon.sun:AppIcon.moon}
          </button>
          <button className="icon-btn" onClick={()=>setTweaksOpen(o=>!o)} aria-label="Tweaks" title="Tweaks" style={{fontSize:'11px',fontFamily:'var(--font-mono)'}}>SET</button>
          <button className="icon-btn" title="Sign out" onClick={()=>{ window._API.doLogout(); setAuthed(false); setSites([]); setDevices([]); }} style={{fontSize:'11px',fontFamily:'var(--font-mono)'}}>OFF</button>
        </header>
        {loading && sites.length === 0 && (
          <div style={{padding:'60px 28px',textAlign:'center',color:'var(--muted)',fontFamily:'var(--font-mono)',fontSize:12,letterSpacing:'0.08em'}}>
            LOADING FLEET DATA…
          </div>
        )}

        {loadErr && (
          <div style={{
            margin:'24px 28px 0',padding:'14px 18px',borderRadius:0,
            background:'var(--bad-soft,#fde8e8)',border:'1px solid var(--bad,#b13c3c)',
            fontFamily:'var(--font-mono)',fontSize:12,color:'var(--bad,#b13c3c)',
            display:'flex',alignItems:'center',gap:16,flexWrap:'wrap',
          }}>
            <span style={{flex:1}}>{loadErr}</span>
            <button className="btn btn--sm" onClick={loadAll} style={{whiteSpace:'nowrap'}}>Retry</button>
            <button className="btn btn--sm" onClick={() => {
              localStorage.removeItem('sf_tok');
              localStorage.removeItem('sf_base');
              window.location.reload();
            }} style={{whiteSpace:'nowrap'}}>Sign in again</button>
          </div>
        )}

        {kpData && kpData.k_index >= 5 && (
          <div style={{
            margin:'24px 28px 0',padding:'12px 18px',borderRadius:0,
            background:'var(--warn-soft)',border:'1px solid var(--warn)',
            fontFamily:'var(--font-mono)',fontSize:12,color:'var(--warn)',
            display:'flex',alignItems:'center',gap:10,
          }}>
            <span>
              <strong>Geomagnetic storm active</strong>. NOAA Kp index is {kpData.k_index} ({kpData.condition_label || 'G'+(kpData.k_index-4)+' storm'}).
              Starlink latency and signal quality may be degraded.
            </span>
          </div>
        )}

        {tab==='overview'  && <Overview  data={liveData} ui={tweaks} onOpenDish={setDish} onJump={setTab} onRunDiagnostics={isAdmin ? runFleetDiagnostics : null} />}
        {tab==='starlinks' && <Starlinks data={liveData} filter={{campus}} onOpenDish={setDish} />}
        {tab==='computers' && (
          <Computers
            data={liveData}
            filter={{campus}}
            onPushUpdate={pushLaptopUpdate}
            pushBusy={pushBusy}
            pushMessage={pushMessage}
            pushError={pushError}
          />
        )}
        {tab==='alerts'    && <Alerts    data={liveData} onAckAlert={acknowledgeAlert} ackBusy={alertAckBusy} onAssignAlert={assignAlert} assignBusy={alertAssignBusy} />}
        {tab==='campuses'  && <Campuses  data={liveData} />}
        {tab==='map'       && <MapView   data={liveData} onOpenDish={setDish} onJump={setTab} />}
      </main>

      <nav className="bottom-nav" aria-label="Primary navigation">
        <BottomNavItem icon={AppIcon.overview} label="Overview" active={tab==='overview'} onClick={()=>setTab('overview')} />
        <BottomNavItem icon={AppIcon.dish} label="Starlinks" active={tab==='starlinks'} onClick={()=>setTab('starlinks')} />
        <BottomNavItem icon={AppIcon.laptop} label="Computers" active={tab==='computers'} onClick={()=>setTab('computers')} />
        <BottomNavItem icon={AppIcon.bell} label="Alerts" active={tab==='alerts'} onClick={()=>setTab('alerts')} count={openAlertCount || null} />
        <BottomNavItem icon={AppIcon.campus} label="Campuses" active={tab==='campuses'} onClick={()=>setTab('campuses')} />
        <BottomNavItem icon={AppIcon.map} label="Map" active={tab==='map'} onClick={()=>setTab('map')} />
      </nav>

      <DishDetail dish={dish} data={liveData} onClose={()=>setDish(null)} />

      {tweaksOpen && (
        <div className="tweaks">
          <div className="tweaks__head">
            <h3 className="tweaks__title">Tweaks</h3>
            <button className="icon-btn" onClick={()=>setTweaksOpen(false)} aria-label="Close">{AppIcon.close}</button>
          </div>
          <Choices label="Theme" value={tweaks.theme} onChange={v=>patch({theme:v})} options={[['light','Light'],['dark','Dark']]} />
          <div className="tweaks__row">
            <label>Accent color</label>
            <div className="tweaks__swatches">
              {Object.entries(ACCENTS).map(([k,v]) => (
                <button key={k} className={`tweaks__sw ${tweaks.accent===k?'is-active':''}`}
                  style={{background:tweaks.theme==='dark'?v.dark:v.light}} onClick={()=>patch({accent:k})} aria-label={k} />
              ))}
            </div>
          </div>
          <Choices label="Type pairing" value={tweaks.typePairing} onChange={v=>patch({typePairing:v})}
            options={[['serif-sans','Serif + Sans'],['all-sans','All sans'],['mono-heavy','Mono display'],['editorial','Editorial']]} />
          <Choices label="Density" value={tweaks.density} onChange={v=>patch({density:v})}
            options={[['cozy','Cozy'],['default','Default'],['dense','Dense']]} />
          <Choices label="Sidebar" value={tweaks.sidebar} onChange={v=>patch({sidebar:v})}
            options={[['wide','Wide'],['tight','Icons only']]} />
          <label className="tweaks__toggle">
            <input type="checkbox" checked={!!tweaks.monochromeStatus} onChange={e=>patch({monochromeStatus:e.target.checked})} />
            Monochrome status chips
          </label>
          <label className="tweaks__toggle">
            <input type="checkbox" checked={!!tweaks.showTopPulse} onChange={e=>patch({showTopPulse:e.target.checked})} />
            Show top-bar status
          </label>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
