<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./starfleet-flow-mockup.html">
  <title>Starfleet Light Mockup</title>
  <style>
    :root {
      --bg: #f3f6f1;
      --ink: #222b27;
      --rule: #cfd9d2;
      --accent: #24825f;
      --font-ui: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-serif: Georgia, serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-ui);
    }
    main {
      width: min(520px, calc(100vw - 32px));
      border: 1px solid var(--rule);
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 500;
    }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>Starfleet light mockup moved</h1>
    <p>The current dark and light variants now live in the flow-centric interactive mockup.</p>
    <p><a href="./starfleet-flow-mockup.html">Open the current mockup</a></p>
  </main>
</body>
</html>
